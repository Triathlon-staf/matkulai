<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduPattern AI — Analisis Pola Belajar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body: ['Outfit', 'sans-serif'],
          },
          colors: {
            gold: { 300:'#fde68a', 400:'#fbbf24', 500:'#f59e0b', 600:'#d97706', 700:'#b45309' },
            ink: { 950:'#04040a', 900:'#080810', 800:'#0e0e1a', 700:'#141424', 600:'#1c1c2e', 500:'#242438', 400:'#2e2e48' },
          }
        }
      }
    };
  </script>
  <style>
    :root {
      --gold: #f59e0b;
      --gold-glow: rgba(245,158,11,0.12);
      --emerald: #10b981;
      --rose: #f43f5e;
      --violet: #8b5cf6;
      --sky: #0ea5e9;
    }
    * { scrollbar-width: thin; scrollbar-color: #2e2e48 transparent; box-sizing: border-box; }
    html { font-size: 16px; }
    body { font-family: 'Outfit', sans-serif; background: #04040a; color: #e2e2f0; overflow-x: hidden; margin: 0; }
    h1,h2,h3,h4,h5,h6 { font-family: 'Syne', sans-serif; }

    /* === MESH BACKGROUND === */
    .mesh-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 10% 20%, rgba(245,158,11,0.055) 0%, transparent 60%),
        radial-gradient(ellipse 500px 500px at 90% 80%, rgba(139,92,246,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 400px 300px at 50% 50%, rgba(14,165,233,0.025) 0%, transparent 70%);
    }
    .grid-lines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.025;
      background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* === GLASS === */
    .card {
      background: rgba(14,14,26,0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 16px;
      transition: border-color 0.25s;
    }
    .card:hover { border-color: rgba(245,158,11,0.18); }
    .card-static {
      background: rgba(14,14,26,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 16px;
    }
    .card-glow { box-shadow: 0 0 40px rgba(245,158,11,0.08); }

    /* === SIDEBAR === */
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-radius: 10px;
      font-size: 13.5px; font-weight: 500; color: #9090b0;
      cursor: pointer; transition: all 0.2s;
      border: 1px solid transparent;
      background: transparent; width: 100%; text-align: left;
    }
    .nav-item:hover { color: #e2e2f0; background: rgba(255,255,255,0.04); }
    .nav-item.active {
      color: #f59e0b; background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.2);
    }
    .nav-item .icon { width: 28px; height: 28px; border-radius: 8px; display:flex; align-items:center; justify-content:center; font-size: 12px; flex-shrink: 0; }
    .nav-item.active .icon { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .nav-item .icon { background: rgba(255,255,255,0.05); }

    /* === SIDEBAR SECTIONS === */
    .nav-section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #50506a; text-transform: uppercase; padding: 14px 14px 6px; }

    /* === BUTTONS === */
    .btn-gold {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a0e00; font-weight: 700; font-family: 'Syne', sans-serif;
      border: none; cursor: pointer; border-radius: 10px;
      transition: all 0.2s; letter-spacing: 0.02em;
    }
    .btn-gold:hover { box-shadow: 0 0 24px rgba(245,158,11,0.35); transform: translateY(-1px); }
    .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #9090b0; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.08); color: #e2e2f0; }

    /* === INPUTS === */
    .input-field {
      background: rgba(8,8,16,0.8); border: 1px solid rgba(255,255,255,0.08);
      color: #e2e2f0; border-radius: 10px; padding: 10px 14px; font-size: 14px;
      font-family: 'Outfit', sans-serif; width: 100%; transition: border-color 0.2s;
    }
    .input-field:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
    .input-field::placeholder { color: #50506a; }
    select.input-field option { background: #0e0e1a; }

    /* === RANGE === */
    input[type="range"] { -webkit-appearance: none; background: transparent; border: none; width: 100%; }
    input[type="range"]::-webkit-slider-track { height: 5px; background: #242438; border-radius: 3px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #f59e0b; cursor: pointer; margin-top: -6.5px; box-shadow: 0 0 8px rgba(245,158,11,0.5); }

    /* === BADGE === */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
    .badge-green { background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
    .badge-red { background: rgba(244,63,94,0.12); color: #f43f5e; border: 1px solid rgba(244,63,94,0.2); }
    .badge-gold { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
    .badge-violet { background: rgba(139,92,246,0.12); color: #8b5cf6; border: 1px solid rgba(139,92,246,0.2); }

    /* === PROGRESS BAR === */
    .progress-bar { height: 6px; background: #1c1c2e; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }

    /* === TABLE === */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { font-size: 11px; font-weight: 600; color: #50506a; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: left; }
    .data-table td { padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13.5px; color: #b0b0c8; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .data-table tbody tr:hover { background: rgba(245,158,11,0.03); }

    /* === ANIMATIONS === */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideRight { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.3); } 70% { box-shadow: 0 0 0 10px rgba(245,158,11,0); } 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes toast-in { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toast-out { to { transform: translateX(120%); opacity: 0; } }
    @keyframes count-up { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

    .fade-up { animation: fadeUp 0.4s ease-out both; }
    .fade-in { animation: fadeIn 0.3s ease both; }
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
    .stagger-5 { animation-delay: 0.25s; }

    .toast { animation: toast-in 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
    .toast.out { animation: toast-out 0.3s ease forwards; }

    /* === STAT CARD === */
    .stat-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 11px; color: #60607a; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 4px; }

    /* === SCORE RING === */
    .score-ring-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 10; }
    .score-ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.34,1.56,0.64,1); }

    /* === LOADING === */
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }

    /* === SIDEBAR MOBILE === */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); position: fixed; z-index: 60; }
      .sidebar.open { transform: translateX(0); }
      .main-area { margin-left: 0 !important; }
    }

    /* === CHAT AI === */
    .chat-msg { max-width: 82%; }
    .chat-msg.user { margin-left: auto; background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.2); border-radius: 14px 14px 4px 14px; }
    .chat-msg.ai { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px 14px 14px 4px; }
    .chat-scroll { height: 340px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #242438; border-radius: 2px; }

    /* === POMODORO === */
    .pomo-ring { transform: rotate(-90deg); transform-origin: center; }
    .pomo-track { fill: none; stroke: #1c1c2e; stroke-width: 12; }
    .pomo-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

    /* === GOAL CARD === */
    .goal-card { border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; background: rgba(8,8,16,0.6); transition: all 0.2s; }
    .goal-card:hover { border-color: rgba(245,158,11,0.2); }
    .goal-card.done { border-color: rgba(16,185,129,0.25); background: rgba(16,185,129,0.04); }

    /* === NOTIFICATION DOT === */
    .notif-dot { width: 7px; height: 7px; background: #f43f5e; border-radius: 50%; position: absolute; top: 4px; right: 4px; animation: pulse-ring 2s infinite; }

    /* === CUSTOM SCROLLBAR === */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #242438; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2e2e48; }

    /* === TABS === */
    .tab-strip { display: flex; gap: 4px; background: rgba(8,8,16,0.8); padding: 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
    .tab-btn { flex: 1; padding: 8px 12px; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: 'Syne', sans-serif; border: none; cursor: pointer; transition: all 0.2s; color: #60607a; background: transparent; }
    .tab-btn.active { background: rgba(245,158,11,0.15); color: #f59e0b; }

    /* === AUTH SPECIAL === */
    .auth-orb { width: 320px; height: 320px; border-radius: 50%; position: absolute; filter: blur(80px); pointer-events: none; }

    /* === NUMBER TICKER === */
    .ticker { display: inline-block; animation: count-up 0.6s ease both; }

    /* Notification panel */
    .notif-panel { position: absolute; top: calc(100% + 8px); right: 0; width: 300px; z-index: 100; }
  </style>
</head>
<body>
<div class="mesh-bg"></div>
<div class="grid-lines"></div>
<div id="toastContainer" class="fixed top-4 right-4 z-[200] flex flex-col gap-2" style="min-width:0;max-width:340px;"></div>

<!-- ==================== AUTH PAGE ==================== -->
<div id="authPage" class="relative z-10 min-h-screen flex items-center justify-center p-4">
  <!-- Decorative orbs -->
  <div class="auth-orb" style="background:rgba(245,158,11,0.07);top:-100px;left:-120px;"></div>
  <div class="auth-orb" style="background:rgba(139,92,246,0.05);bottom:-80px;right:-100px;width:260px;height:260px;"></div>

  <div class="w-full max-w-[400px] relative z-10">
    <div class="text-center mb-8 fade-up">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.05));border:1px solid rgba(245,158,11,0.25);">
        <i class="fa-solid fa-brain text-xl text-gold-400"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">EduPattern <span class="text-gold-400">AI</span></h1>
      <p class="text-sm text-[#60607a] mt-1.5 font-medium">Platform Analisis Pola Belajar Cerdas</p>
    </div>

    <div class="card card-glow p-6 fade-up stagger-1">
      <div class="tab-strip mb-6" id="authTabs">
        <button onclick="switchAuthTab('login')" class="tab-btn active" id="tabLogin">Masuk</button>
        <button onclick="switchAuthTab('register')" class="tab-btn" id="tabRegister">Daftar</button>
      </div>

      <!-- Login -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Email</label>
            <input type="email" id="loginEmail" required class="input-field" placeholder="email@contoh.com"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Password</label>
            <div class="relative">
              <input type="password" id="loginPass" required class="input-field pr-10" placeholder="••••••••"/>
              <button type="button" onclick="togglePassword('loginPass',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#50506a] hover:text-[#9090b0] text-sm">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" id="loginBtn" class="btn-gold w-full py-3 text-sm mt-2 flex items-center justify-center gap-2">
            <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard
          </button>
        </div>
      </form>

      <!-- Register -->
      <form id="registerForm" onsubmit="handleRegister(event)" class="hidden">
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Nama Lengkap</label>
            <input type="text" id="regName" required class="input-field" placeholder="Nama lengkap Anda"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Email</label>
            <input type="email" id="regEmail" required class="input-field" placeholder="email@contoh.com"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Password</label>
            <div class="relative">
              <input type="password" id="regPass" required minlength="6" class="input-field pr-10" placeholder="Min. 6 karakter"/>
              <button type="button" onclick="togglePassword('regPass',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#50506a] hover:text-[#9090b0] text-sm">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Peran</label>
            <select id="regRole" required class="input-field">
              <option value="student">👨‍🎓 Mahasiswa</option>
              <option value="lecturer">👨‍🏫 Dosen</option>
            </select>
          </div>
          <button type="submit" id="regBtn" class="btn-gold w-full py-3 text-sm mt-2 flex items-center justify-center gap-2">
            <i class="fa-solid fa-user-plus"></i> Buat Akun
          </button>
        </div>
      </form>
    </div>

    <!-- Demo accounts -->
    <div class="card p-4 mt-3 fade-up stagger-2">
      <p class="text-xs text-[#50506a] mb-3 flex items-center gap-2"><i class="fa-solid fa-flask-vial text-gold-400"></i><span class="font-semibold">Akun Demo — klik untuk isi otomatis</span></p>
      <div class="flex gap-2">
        <button onclick="fillDemo('student')" class="btn-ghost flex-1 py-2 text-xs flex items-center justify-center gap-2">
          <i class="fa-solid fa-graduation-cap text-gold-400"></i> Mahasiswa
        </button>
        <button onclick="fillDemo('lecturer')" class="btn-ghost flex-1 py-2 text-xs flex items-center justify-center gap-2">
          <i class="fa-solid fa-chalkboard-user text-violet-400"></i> Dosen
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ==================== STUDENT DASHBOARD ==================== -->
<div id="studentDash" class="relative z-10 hidden">
  <!-- Mobile top bar -->
  <div class="md:hidden fixed top-0 inset-x-0 z-50 card-static px-4 py-3 flex items-center justify-between" style="border-radius:0;border-left:0;border-right:0;border-top:0;">
    <button onclick="toggleSidebar('sidebar','sOverlay')" class="text-[#70709a] hover:text-gold-400 transition-colors">
      <i class="fa-solid fa-bars text-lg"></i>
    </button>
    <span class="font-display font-bold text-sm text-white">EduPattern <span class="text-gold-400">AI</span></span>
    <button onclick="App.logout()" class="text-[#70709a] hover:text-rose-400 transition-colors">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar fixed left-0 top-0 bottom-0 w-[220px] card-static flex flex-col z-50 transition-transform duration-300" style="border-radius:0;border-top:0;border-bottom:0;border-left:0;">
    <div class="p-5 border-b border-white/5">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(245,158,11,0.06));border:1px solid rgba(245,158,11,0.2);">
          <i class="fa-solid fa-brain text-gold-400 text-sm"></i>
        </div>
        <div>
          <h2 class="font-display font-bold text-sm text-white">EduPattern</h2>
          <p class="text-[10px] text-[#50506a] font-semibold uppercase tracking-wider">Student</p>
        </div>
      </div>
    </div>
    <nav class="flex-1 py-3 px-3 space-y-0.5 overflow-y-auto">
      <p class="nav-section-title">Menu</p>
      <button onclick="StudentView.showTab('overview')" data-tab="overview" class="nav-item active">
        <span class="icon"><i class="fa-solid fa-house-chimney"></i></span> Beranda
      </button>
      <button onclick="StudentView.showTab('input')" data-tab="input" class="nav-item">
        <span class="icon"><i class="fa-solid fa-pen-to-square"></i></span> Input Aktivitas
      </button>
      <button onclick="StudentView.showTab('patterns')" data-tab="patterns" class="nav-item">
        <span class="icon"><i class="fa-solid fa-chart-line"></i></span> Pola Belajar
      </button>
      <button onclick="StudentView.showTab('recommendations')" data-tab="recommendations" class="nav-item">
        <span class="icon"><i class="fa-solid fa-lightbulb"></i></span> Rekomendasi
      </button>
      <p class="nav-section-title">Tools</p>
      <button onclick="StudentView.showTab('pomodoro')" data-tab="pomodoro" class="nav-item">
        <span class="icon"><i class="fa-solid fa-clock-rotate-left"></i></span> Timer Pomodoro
      </button>
      <button onclick="StudentView.showTab('goals')" data-tab="goals" class="nav-item">
        <span class="icon"><i class="fa-solid fa-bullseye"></i></span> Target Belajar
      </button>
      <button onclick="StudentView.showTab('chat')" data-tab="chat" class="nav-item">
        <span class="icon"><i class="fa-solid fa-robot"></i></span> AI Tutor
      </button>
      <button onclick="StudentView.showTab('calendar')" data-tab="calendar" class="nav-item">
        <span class="icon"><i class="fa-solid fa-calendar-days"></i></span> Kalender
      </button>
    </nav>
    <div class="p-4 border-t border-white/5">
      <div class="flex items-center gap-3 mb-3">
        <div id="studentAvatar" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a0e00;">BS</div>
        <div class="flex-1 min-w-0">
          <p id="studentName" class="text-xs font-semibold text-white truncate">Budi Santoso</p>
          <p class="text-[10px] text-[#50506a]">Mahasiswa</p>
        </div>
      </div>
      <button onclick="App.logout()" class="btn-ghost w-full py-2 text-xs flex items-center justify-center gap-2 hover:!text-rose-400">
        <i class="fa-solid fa-right-from-bracket"></i> Keluar
      </button>
    </div>
  </aside>
  <div id="sOverlay" onclick="toggleSidebar('sidebar','sOverlay')" class="hidden fixed inset-0 bg-black/60 z-40 md:hidden"></div>

  <main class="main-area min-h-screen pb-8 px-5 pt-5 md:pt-5" style="margin-left:220px;">
    <div class="md:hidden h-12 mb-2"></div>
    <div id="studentContent" class="max-w-5xl mx-auto"></div>
  </main>
</div>

<!-- ==================== LECTURER DASHBOARD ==================== -->
<div id="lecturerDash" class="relative z-10 hidden">
  <div class="md:hidden fixed top-0 inset-x-0 z-50 card-static px-4 py-3 flex items-center justify-between" style="border-radius:0;border-left:0;border-right:0;border-top:0;">

<script>
/* ================================================================
   FIREBASE SIMULATION LAYER
================================================================ */
const DB = { users: {}, aktivitas: [], analisis: {}, goals: {}, announcements: [], pomodoroSessions: {} };

const FireAuth = {
  async signIn(email, password) {
    await delay(450);
    const user = Object.values(DB.users).find(u => u.email === email);
    if (!user) throw new Error('Akun tidak ditemukan');
    if (user.password !== password) throw new Error('Password salah');
    return { uid: user.id, email: user.email, displayName: user.name, role: user.role };
  },
  async signUp(name, email, password, role) {
    await delay(500);
    if (Object.values(DB.users).find(u => u.email === email)) throw new Error('Email sudah terdaftar');
    const id = 'u_' + Date.now();
    DB.users[id] = { id, name, email, password, role };
    return { uid: id, email, displayName: name, role };
  },
  signOut() {}
};

const FireStore = {
  async getActivities(userId) {
    await delay(80);
    return DB.aktivitas.filter(a => a.userId === userId).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  },
  async addActivity(data) {
    await delay(180);
    const id = 'act_' + Date.now();
    const doc = { id, ...data };
    DB.aktivitas.push(doc);
    CloudFunctions.onActivityCreated(doc);
    return doc;
  },
  async getAnalysis(userId) { await delay(60); return DB.analisis[userId] || null; },
  async getAllStudents() { await delay(80); return Object.values(DB.users).filter(u=>u.role==='student'); },
  async getGoals(userId) { await delay(60); return DB.goals[userId] || []; },
  async saveGoal(userId, goal) {
    await delay(120);
    if (!DB.goals[userId]) DB.goals[userId] = [];
    const existing = DB.goals[userId].findIndex(g=>g.id===goal.id);
    if (existing >= 0) DB.goals[userId][existing] = goal;
    else DB.goals[userId].push(goal);
    return goal;
  },
  async deleteGoal(userId, goalId) {
    await delay(80);
    DB.goals[userId] = (DB.goals[userId]||[]).filter(g=>g.id!==goalId);
  },
  async getAnnouncements() { await delay(60); return DB.announcements; },
  async addAnnouncement(ann) {
    await delay(150);
    const doc = { id: 'ann_'+Date.now(), ...ann, createdAt: new Date().toISOString() };
    DB.announcements.unshift(doc);
    return doc;
  }
};

const CloudFunctions = {
  onActivityCreated(activity) {
    const userId = activity.userId;
    const allActs = DB.aktivitas.filter(a => a.userId === userId);
    const analysis = AIEngine.analyzePatterns(allActs);
    const recommendations = AIEngine.generateRecommendations(analysis);
    DB.analisis[userId] = { polaBelajar: analysis, rekomendasi: recommendations, updatedAt: new Date().toISOString() };
  }
};

/* ================================================================
   AI ENGINE
================================================================ */
const AIEngine = {
  analyzePatterns(activities) {
    if (!activities.length) return this.emptyAnalysis();
    const now = new Date();
    const weekMs = 7*86400000;
    const timeSlots = { pagi:0, siang:0, sore:0, malam:0, larut:0 };
    let totalDurasi = 0; const durations = [];
    const materiCount = {}; const dailyHours = {};
    activities.forEach(a => {
      const d = new Date(a.timestamp); const h = d.getHours();
      totalDurasi += a.durasi; durations.push(a.durasi);
      materiCount[a.materi] = (materiCount[a.materi]||0)+1;
      const dk = d.toISOString().slice(0,10);
      dailyHours[dk] = (dailyHours[dk]||0)+a.durasi;
      if(h>=6&&h<12) timeSlots.pagi++;
      else if(h>=12&&h<15) timeSlots.siang++;
      else if(h>=15&&h<18) timeSlots.sore++;
      else if(h>=18&&h<22) timeSlots.malam++;
      else timeSlots.larut++;
    });
    const maxSlot = Object.entries(timeSlots).sort((a,b)=>b[1]-a[1])[0];
    const typeMap = { pagi:'Pagi Hari (06-12)', siang:'Siang Hari (12-15)', sore:'Sore Hari (15-18)', malam:'Malam Hari (18-22)', larut:'Larut Malam (22-06)' };
    const tipeBelajar = typeMap[maxSlot[0]];
    const avgDurasi = totalDurasi/activities.length;
    const minDurasi = Math.min(...durations); const maxDurasi = Math.max(...durations);
    const stdDurasi = Math.sqrt(durations.reduce((s,d)=>s+Math.pow(d-avgDurasi,2),0)/durations.length);
    const kategoriDurasi = avgDurasi<30?'Kurang Fokus':avgDurasi<60?'Sedang':avgDurasi<120?'Fokus':'Intensif';
    const dayValues = Object.values(dailyHours);
    const avgPerDay = dayValues.reduce((s,v)=>s+v,0)/dayValues.length;
    const stdDay = Math.sqrt(dayValues.reduce((s,v)=>s+Math.pow(v-avgPerDay,2),0)/dayValues.length);
    const consistencyScore = Math.max(0,Math.min(100,Math.round(100-(stdDay/Math.max(1,avgPerDay))*100)));
    const konsistensi = consistencyScore>=70?'Konsisten':consistencyScore>=40?'Cukup Konsisten':'Tidak Konsisten';
    const totalSessions = activities.length; const activeDays = Object.keys(dailyHours).length;
    const daysSpan = Math.max(1,Math.ceil((now-new Date(activities[activities.length-1].timestamp))/86400000));
    const freqPerWeek = (totalSessions/daysSpan)*7;
    const topMateri = Object.entries(materiCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const week1 = activities.filter(a=>now-new Date(a.timestamp)<weekMs);
    const week2 = activities.filter(a=>{const d=now-new Date(a.timestamp);return d>=weekMs&&d<2*weekMs;});
    const avgW1 = week1.length?week1.reduce((s,a)=>s+a.durasi,0)/week1.length:0;
    const avgW2 = week2.length?week2.reduce((s,a)=>s+a.durasi,0)/week2.length:0;
    const trendPct = avgW2>0?Math.round(((avgW1-avgW2)/avgW2)*100):week1.length>0?50:0;
    const tren = trendPct>10?'Meningkat':trendPct<-10?'Menurun':'Stabil';
    const skor = Math.round(consistencyScore*0.35+Math.min(100,(avgDurasi/90)*100)*0.3+Math.min(100,(freqPerWeek/7)*100)*0.2+(trendPct>0?20:trendPct>-10?10:0));
    const dayOfWeekDist = [0,0,0,0,0,0,0]; const dayOfWeekMinutes = [0,0,0,0,0,0,0];
    activities.forEach(a=>{const dow=new Date(a.timestamp).getDay();dayOfWeekDist[dow]++;dayOfWeekMinutes[dow]+=a.durasi;});
    // Weekly trend data (last 4 weeks)
    const weeklyData = [];
    for(let w=3;w>=0;w--){
      const wActs = activities.filter(a=>{const d=now-new Date(a.timestamp);return d>=w*weekMs&&d<(w+1)*weekMs;});
      weeklyData.push({week:`-${w+1}W`, total:wActs.reduce((s,a)=>s+a.durasi,0), count:wActs.length});
    }
    return { totalSessions, totalDurasi, totalJam:(totalDurasi/60).toFixed(1), avgDurasi:Math.round(avgDurasi), minDurasi, maxDurasi, stdDurasi:Math.round(stdDurasi), kategoriDurasi, tipeBelajar, konsistensi, consistencyScore, activeDays, daysSpan, freqPerWeek:Math.round(freqPerWeek*10)/10, topMateri, tren, trendPct, skor, timeSlots, dayOfWeekDist, dayOfWeekMinutes, weeklyData, materiCount };
  },
  emptyAnalysis() {
    return { totalSessions:0, totalDurasi:0, totalJam:'0', avgDurasi:0, minDurasi:0, maxDurasi:0, stdDurasi:0, skor:0, tren:'Belum ada data', trendPct:0, konsistensi:'-', consistencyScore:0, tipeBelajar:'-', kategoriDurasi:'-', topMateri:[], timeSlots:{pagi:0,siang:0,sore:0,malam:0,larut:0}, dayOfWeekDist:[0,0,0,0,0,0,0], dayOfWeekMinutes:[0,0,0,0,0,0,0], weeklyData:[], materiCount:{} };
  },
  generateRecommendations(analysis) {
    if (!analysis.totalSessions) return [{icon:'fa-circle-info',color:'text-sky-400',bg:'bg-sky-500/10',title:'Mulai Catat Aktivitas',desc:'Belum ada data belajar. Mulai input aktivitas belajar untuk mendapatkan analisis dan rekomendasi personal dari AI.'}];
    const recs = [];
    if (analysis.avgDurasi < 30) recs.push({icon:'fa-clock',color:'text-gold-400',bg:'bg-gold-500/10',title:'Tingkatkan Durasi Belajar',desc:`Rata-rata ${analysis.avgDurasi} menit per sesi terlalu singkat. Disarankan 45-60 menit per sesi. Coba teknik Pomodoro: 25 menit fokus + 5 menit istirahat.`});
    else if (analysis.avgDurasi > 120) recs.push({icon:'fa-hourglass-half',color:'text-orange-400',bg:'bg-orange-500/10',title:'Hindari Sesi Terlalu Panjang',desc:`${analysis.avgDurasi} menit/sesi bisa menyebabkan kelelahan kognitif. Bagi menjadi 2-3 blok 45-60 menit dengan jeda 15-20 menit.`});
    else recs.push({icon:'fa-circle-check',color:'text-emerald-400',bg:'bg-emerald-500/10',title:'Durasi Belajar Optimal',desc:`Rata-rata ${analysis.avgDurasi} menit/sesi sangat baik. Pertahankan konsistensi ini dan pastikan kualitas fokus tetap terjaga.`});
    if (analysis.consistencyScore < 40) recs.push({icon:'fa-calendar-xmark',color:'text-rose-400',bg:'bg-rose-500/10',title:'Perkuat Konsistensi',desc:'Pola belajar sangat tidak menentu. Buat jadwal tetap: tentukan jam belajar yang sama setiap hari. Gunakan fitur Target Belajar untuk tracking.'});
    if (analysis.tipeBelajar.includes('Larut')) recs.push({icon:'fa-moon',color:'text-violet-400',bg:'bg-violet-500/10',title:'Perhatikan Pola Tidur',desc:'Belajar >22:00 mengganggu siklus tidur dan konsolidasi memori. Coba geser jadwal ke pagi atau sore hari untuk hasil lebih optimal.'});
    if (analysis.freqPerWeek < 4) recs.push({icon:'fa-repeat',color:'text-sky-400',bg:'bg-sky-500/10',title:'Perbanyak Frekuensi Belajar',desc:`${analysis.freqPerWeek}x/minggu terlalu jarang. Target minimal 5-6 sesi/minggu. Sesi pendek tapi rutin lebih baik daripada sesi panjang tapi jarang.`});
    if (analysis.tren === 'Menurun') recs.push({icon:'fa-arrow-trend-down',color:'text-rose-400',bg:'bg-rose-500/10',title:'Tren Menurun Terdeteksi',desc:`Aktivitas turun ${Math.abs(analysis.trendPct)}% dibanding minggu lalu. Identifikasi hambatan, minta bantuan teman, atau konsultasi dengan dosen pembimbing.`});
    else if (analysis.tren === 'Meningkat') recs.push({icon:'fa-arrow-trend-up',color:'text-emerald-400',bg:'bg-emerald-500/10',title:'Momentum Positif!',desc:`Keren! Aktivitas naik ${analysis.trendPct}% minggu ini. Pertahankan momentum ini dan tetapkan target yang lebih menantang.`});
    if (analysis.topMateri.length >= 2) recs.push({icon:'fa-book-open',color:'text-violet-400',bg:'bg-violet-500/10',title:'Seimbangkan Materi',desc:`Fokus terbanyak di ${analysis.topMateri[0][0]}. Pastikan semua mata kuliah mendapat perhatian proporsional sesuai bobot SKS.`});
    return recs;
  },
  isAtRisk(analysis) {
    if (!analysis || analysis.totalSessions === 0) return true;
    let r = 0;
    if (analysis.freqPerWeek < 3) r+=3; else if (analysis.freqPerWeek < 5) r+=1;
    if (analysis.avgDurasi < 25) r+=3; else if (analysis.avgDurasi < 40) r+=1;
    if (analysis.consistencyScore < 30) r+=3; else if (analysis.consistencyScore < 50) r+=1;
    if (analysis.tren === 'Menurun') r+=2;
    if (analysis.skor < 30) r+=2; else if (analysis.skor < 50) r+=1;
    return r >= 5;
  },
  getRiskLevel(analysis) {
    if (!analysis || analysis.totalSessions === 0) return 'high';
    let r = 0;
    if (analysis.freqPerWeek < 3) r+=3; else if (analysis.freqPerWeek < 5) r+=1;
    if (analysis.avgDurasi < 25) r+=3; else if (analysis.avgDurasi < 40) r+=1;
    if (analysis.consistencyScore < 30) r+=3; else if (analysis.consistencyScore < 50) r+=1;
    if (analysis.tren === 'Menurun') r+=2;
    if (analysis.skor < 30) r+=2; else if (analysis.skor < 50) r+=1;
    if (r >= 7) return 'high'; if (r >= 4) return 'medium'; return 'low';
  }
};

   SEED DATA
================================================================ */

/* ================================================================
   UTILITIES
================================================================ */
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

function toast(msg, type='success', dur=3000) {
  const el = document.createElement('div');
  const cfg = {
    success:{bg:'rgba(16,185,129,0.12)',border:'rgba(16,185,129,0.25)',icon:'fa-check-circle text-emerald-400'},
    error:{bg:'rgba(244,63,94,0.12)',border:'rgba(244,63,94,0.25)',icon:'fa-times-circle text-rose-400'},
    info:{bg:'rgba(14,165,233,0.12)',border:'rgba(14,165,233,0.25)',icon:'fa-info-circle text-sky-400'},
    warn:{bg:'rgba(245,158,11,0.12)',border:'rgba(245,158,11,0.25)',icon:'fa-exclamation-triangle text-gold-400'},
  };
  const c = cfg[type]||cfg.success;
  el.className = 'toast flex items-center gap-3 px-4 py-3 rounded-2xl text-sm text-gray-200';
  el.style.cssText = `background:${c.bg};border:1px solid ${c.border};backdrop-filter:blur(20px);`;
  el.innerHTML = `<i class="fa-solid ${c.icon} text-base flex-shrink-0"></i><span style="font-family:'Outfit',sans-serif;">${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),300); }, dur);
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
}
function formatDate(iso) { return new Date(iso).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}); }
function getInitials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

let chartInstances = {};
function destroyCharts(prefix='') {
  Object.keys(chartInstances).forEach(k=>{
    if (!prefix || k.startsWith(prefix)) { try{chartInstances[k].destroy();}catch(e){} delete chartInstances[k]; }
  });
}

function toggleSidebar(id, overId) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById(overId).classList.toggle('hidden');
}
function togglePassword(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type==='password'?'text':'password';
  btn.querySelector('i').className = inp.type==='password'?'fa-solid fa-eye':'fa-solid fa-eye-slash';
}

function scoreColor(s) { return s>=70?'#10b981':s>=40?'#f59e0b':'#f43f5e'; }
function scoreLabel(s) { return s>=70?'Baik':s>=40?'Cukup':'Perlu Perhatian'; }

function statCard(icon, label, value, color, bg) {
  return `<div class="card p-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background:${bg};">

      </div>
    </div>
  </div>`;
}

function scoreRing(score) {
  const r = 44; const circ = 2*Math.PI*r; const offset = circ*(1-score/100);
  const c = scoreColor(score);
  return `<svg viewBox="0 0 100 100" width="100" height="100">
    <circle class="score-ring-track" cx="50" cy="50" r="${r}"/>
    <circle class="score-ring-fill" cx="50" cy="50" r="${r}" stroke="${c}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 50 50)"/>
    <text x="50" y="47" text-anchor="middle" font-family="Syne" font-size="18" font-weight="800" fill="white">${score}</text>
    <text x="50" y="60" text-anchor="middle" font-family="Outfit" font-size="9" fill="#60607a">/ 100</text>
  </svg>`;
}

/* ================================================================
   POMODORO ENGINE
================================================================ */
const Pomodoro = {
  timer: null, timeLeft: 25*60, mode: 'focus', running: false,
  focusMin: 25, breakMin: 5, longBreakMin: 15, sessionCount: 0,
  onTick: null,
  start() {
    if (this.running) return;
    this.running = true;
    this.timer = setInterval(()=>{ this.timeLeft--; if(this.onTick) this.onTick(); if(this.timeLeft<=0) this.complete(); },1000);
  },
  pause() { clearInterval(this.timer); this.running = false; if(this.onTick) this.onTick(); },
  stop() { clearInterval(this.timer); this.running=false; this.timeLeft=this.focusMin*60; this.mode='focus'; if(this.onTick) this.onTick(); },
  setMode(m) { this.pause(); this.mode=m; this.timeLeft=(m==='focus'?this.focusMin:m==='break'?this.breakMin:this.longBreakMin)*60; if(this.onTick) this.onTick(); },
  complete() {
    clearInterval(this.timer); this.running=false;
    toast(this.mode==='focus'?'🎉 Sesi fokus selesai! Ambil istirahat.':'☕ Istirahat selesai. Siap fokus lagi!','info');
    if(this.mode==='focus'){this.sessionCount++;this.mode=this.sessionCount%4===0?'longbreak':'break';this.timeLeft=(this.mode==='break'?this.breakMin:this.longBreakMin)*60;}
    else{this.mode='focus';this.timeLeft=this.focusMin*60;}
    if(this.onTick) this.onTick();
  },
  format() { const m=Math.floor(this.timeLeft/60); const s=this.timeLeft%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; },
  progress() { const total=(this.mode==='focus'?this.focusMin:this.mode==='break'?this.breakMin:this.longBreakMin)*60; return 1-this.timeLeft/total; }
};

  async saveGoal(e) {
    e.preventDefault();
    const goal = { id:'g_'+Date.now(), title:document.getElementById('goalTitle').value, target:parseInt(document.getElementById('goalTarget').value), current:0, unit:document.getElementById('goalUnit').value, deadline:document.getElementById('goalDeadline').value, done:false };

    toast('Target belajar berhasil ditambahkan!');
    await this.renderGoals(document.getElementById('studentContent'));
  },

  async incrementGoal(goalId) {
    const goals = await FireStore.getGoals(App.currentUser.uid);
    const goal = goals.find(g=>g.id===goalId);
    if (!goal) return;
    const inc = parseInt(prompt(`Progress saat ini: ${goal.current}/${goal.target} ${goal.unit}\nMasukkan jumlah penambahan:`)||'0');
    if (!inc || isNaN(inc)) return;
    goal.current = Math.min(goal.target, goal.current + inc);
    if (goal.current >= goal.target) { goal.done = true; toast('🎉 Target tercapai! Luar biasa!'); }
    else toast(`Progress diperbarui: ${goal.current}/${goal.target} ${goal.unit}`);
    await FireStore.saveGoal(App.currentUser.uid, goal);
    document.getElementById('goalsList').innerHTML = this.renderGoalCards(await FireStore.getGoals(App.currentUser.uid));
  },

  async deleteGoal(goalId) {
    if (!confirm('Hapus target ini?')) return;
    await FireStore.deleteGoal(App.currentUser.uid, goalId);
    toast('Target dihapus', 'info');
    document.getElementById('goalsList').innerHTML = this.renderGoalCards(await FireStore.getGoals(App.currentUser.uid));
  },

  async renderCalendar(el) {
    const acts = await FireStore.getActivities(App.currentUser.uid);
    const now = new Date();
    const year = now.getFullYear(); const month = now.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const actByDay = {};
    acts.forEach(a=>{
      const d = new Date(a.timestamp);
      if(d.getFullYear()===year && d.getMonth()===month) {
        const k = d.getDate();
        actByDay[k] = (actByDay[k]||0) + a.durasi;
      }
    });
    const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const dayNames = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

    let calCells = '';
    for(let i=0;i<firstDay;i++) calCells += '<div></div>';
    for(let d=1;d<=daysInMonth;d++) {
      const mins = actByDay[d]||0;
      const isToday = d===now.getDate();
      const intensity = mins===0?'':mins<60?'bg-gold-400/15':mins<120?'bg-gold-400/30':'bg-gold-400/55';
      calCells += `<div class="rounded-xl p-2 text-center transition-all cursor-pointer hover:bg-white/5 ${intensity} ${isToday?'ring-1 ring-gold-400':''}">

        <i class="fa-solid fa-triangle-exclamation text-rose-400 text-lg flex-shrink-0"></i>

          <p class="text-sm font-bold text-white">${atRisk.length} mahasiswa teridentifikasi berisiko</p>
          <p class="text-xs text-[#70709a]">Perlu tindak lanjut: konsultasi, bimbingan, atau penyesuaian metode belajar.</p>
        </div>
      </div>
      <div class="space-y-3 mb-5">
        ${atRisk.map(s=>{
          const a = DB.analisis[s.id]?.polaBelajar || AIEngine.emptyAnalysis();
          const level = AIEngine.getRiskLevel(a);
          const problems = [];
          if(a.freqPerWeek<3) problems.push('Frekuensi belajar sangat rendah');
          if(a.avgDurasi<25) problems.push('Durasi belajar terlalu singkat');
          if(a.consistencyScore<30) problems.push('Pola belajar tidak konsisten');
          if(a.tren==='Menurun') problems.push('Tren belajar menurun pekan ini');
          if(a.skor<30) problems.push('Skor keseluruhan sangat rendah');
          return `<div class="card p-5 cursor-pointer" style="border-left:3px solid ${level==='high'?'#f43f5e':'#f59e0b'};" onclick="LecturerView.showStudentDetail('${s.id}')">
            <div class="flex items-center gap-4 mb-3">
              <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0" style="background:${level==='high'?'rgba(244,63,94,0.12)':'rgba(245,158,11,0.12)'};color:${level==='high'?'#f43f5e':'#f59e0b'};">${getInitials(s.name)}</div>
              <div class="flex-1">
                <p class="text-sm font-bold text-white">${s.name}</p>
                <p class="text-xs text-[#60607a]">${s.email}</p>
              </div>
              <div class="text-right">
                <p class="text-2xl font-bold" style="color:${scoreColor(a.skor)};font-family:'Syne',sans-serif;">${a.skor}</p>
                <p class="text-[10px] text-[#50506a]">/ 100</p>
              </div>
            </div>
            <div class="flex flex-wrap gap-2">
              ${problems.map(p=>`<span class="badge badge-red text-[10px]"><i class="fa-solid fa-xmark text-[8px]"></i>${p}</span>`).join('')}
            </div>
            <div class="flex items-center gap-4 mt-3 pt-3 border-t border-white/5 text-[11px] text-[#60607a]">
              <span><i class="fa-solid fa-book-open mr-1"></i>${a.totalSessions} sesi</span>
              <span><i class="fa-solid fa-clock mr-1"></i>${a.totalJam}j</span>
              <span><i class="fa-solid fa-repeat mr-1"></i>${a.freqPerWeek}x/mggu</span>
              <span class="ml-auto text-[10px] text-[#50506a]">Klik untuk detail →</span>
            </div>
          </div>`;
        }).join('')}
      </div>`}
      <div class="card p-5">
        <h3 class="text-sm font-bold text-white mb-4">Perbandingan Skor Semua Mahasiswa</h3>
        <canvas id="lect_risk_bar" height="160"></canvas>
      </div>
    </div>`;

    const all = [...atRisk,...safe];
    chartInstances['lect_risk_bar'] = new Chart(document.getElementById('lect_risk_bar'),{type:'bar',data:{labels:all.map(s=>s.name.split(' ')[0]),datasets:[{data:all.map(s=>(DB.analisis[s.id]?.polaBelajar||AIEngine.emptyAnalysis()).skor),backgroundColor:all.map(s=>AIEngine.isAtRisk(DB.analisis[s.id]?.polaBelajar)?'rgba(244,63,94,0.55)':'rgba(16,185,129,0.5)'),borderColor:all.map(s=>AIEngine.isAtRisk(DB.analisis[s.id]?.polaBelajar)?'#f43f5e':'#10b981'),borderWidth:1,borderRadius:6,borderSkipped:false}]},options:{responsive:true,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,max:100,grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#60607a'}},y:{grid:{display:false},ticks:{color:'#e2e2f0',font:{size:12,family:'Outfit'}}}}}});
  },

  async renderAnnouncements(el) {
    const anns = await FireStore.getAnnouncements();
    el.innerHTML = `<div class="fade-up">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-xl font-bold text-white">Pengumuman</h2>
          <p class="text-sm text-[#60607a] mt-1">Kelola pengumuman untuk semua mahasiswa</p>
        </div>
      </div>
      <div class="card p-6 mb-5">
        <h3 class="text-sm font-bold text-white mb-4">Buat Pengumuman Baru</h3>
        <form onsubmit="LecturerView.sendAnnouncement(event)" class="space-y-4">
          <div>
            <label class="block text-[11px] font-bold text-[#70707a] uppercase tracking-wider mb-2">Judul</label>
            <input type="text" id="annTitle" required class="input-field" placeholder="Judul pengumuman..."/>
          </div>
          <div>
            <label class="block text-[11px] font-bold text-[#70707a] uppercase tracking-wider mb-2">Isi Pengumuman</label>
            <textarea id="annContent" required rows="3" class="input-field resize-none" placeholder="Tulis pengumuman untuk mahasiswa..."></textarea>
          </div>
          <div class="flex items-center gap-3">
            <div class="flex-1">
              <label class="block text-[11px] font-bold text-[#70707a] uppercase tracking-wider mb-2">Prioritas</label>
              <select id="annPriority" class="input-field">
                <option value="medium">ℹ️ Informasi</option>
                <option value="high">🚨 Penting</option>
              </select>
            </div>
            <div class="flex items-end">
              <button type="submit" class="btn-gold px-6 py-2.5 text-sm flex items-center gap-2">
                <i class="fa-solid fa-bullhorn"></i> Kirim
              </button>
            </div>
          </div>
        </form>
      </div>
      <div class="space-y-3">
        ${anns.length ? anns.map(ann=>`
          <div class="card p-5 flex items-start gap-4">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background:${ann.priority==='high'?'rgba(244,63,94,0.1)':'rgba(14,165,233,0.1)'};">
              <i class="fa-solid ${ann.priority==='high'?'fa-triangle-exclamation text-rose-400':'fa-circle-info text-sky-400'}"></i>
            </div>
            <div class="flex-1">
              <div class="flex items-start justify-between">
                <h4 class="text-sm font-bold text-white">${ann.title}</h4>
                <span class="badge ${ann.priority==='high'?'badge-red':'badge-violet'} ml-2">${ann.priority==='high'?'Penting':'Info'}</span>
              </div>
              <p class="text-sm text-[#8080a0] mt-1 leading-relaxed">${ann.content}</p>
              <p class="text-[11px] text-[#50506a] mt-2">${ann.author} · ${formatDate(ann.createdAt)}</p>
            </div>
          </div>`).join('') : '<p class="text-center text-[#60607a] py-8 card">Belum ada pengumuman</p>'}
      </div>
    </div>`;
  },

  async sendAnnouncement(e) {
    e.preventDefault();
    await FireStore.addAnnouncement({title:document.getElementById('annTitle').value,content:document.getElementById('annContent').value,priority:document.getElementById('annPriority').value,author:App.currentUser.displayName});
    toast('📢 Pengumuman berhasil dikirim ke semua mahasiswa!');
    await this.renderAnnouncements(document.getElementById('lecturerContent'));
  },

  renderExport(el) {
    const students = Object.values(DB.users).filter(u=>u.role==='student');
    el.innerHTML = `<div class="fade-up">
      <div class="mb-6">
        <h2 class="text-xl font-bold text-white">Export Laporan</h2>
        <p class="text-sm text-[#60607a] mt-1">Unduh laporan performa kelas dalam berbagai format</p>
      </div>
      <div class="grid md:grid-cols-2 gap-4 mb-6">
        <div class="card p-6">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:rgba(16,185,129,0.1);">
              <i class="fa-solid fa-file-csv text-emerald-400"></i>
            </div>
            <div>
              <h3 class="text-sm font-bold text-white">Export CSV</h3>
              <p class="text-xs text-[#60607a]">Data lengkap dalam format spreadsheet</p>
            </div>
          </div>
          <p class="text-xs text-[#70709a] mb-4 leading-relaxed">Berisi data semua mahasiswa: nama, sesi, jam, skor, konsistensi, tren, dan status risiko.</p>
          <button onclick="LecturerView.exportCSV()" class="btn-gold w-full py-2.5 text-sm flex items-center justify-center gap-2">
            <i class="fa-solid fa-download"></i> Download CSV
          </button>
        </div>
        <div class="card p-6">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:rgba(14,165,233,0.1);">
              <i class="fa-solid fa-file-code text-sky-400"></i>
            </div>
            <div>
              <h3 class="text-sm font-bold text-white">Export JSON</h3>
              <p class="text-xs text-[#60607a]">Data analisis lengkap dalam format JSON</p>
            </div>
          </div>
          <p class="text-xs text-[#70709a] mb-4 leading-relaxed">Format JSON cocok untuk integrasi dengan sistem akademik lainnya atau analisis lebih lanjut.</p>
          <button onclick="LecturerView.exportJSON()" class="btn-ghost w-full py-2.5 text-sm flex items-center justify-center gap-2">
            <i class="fa-solid fa-download"></i> Download JSON
          </button>
        </div>
      </div>
      <div class="card p-5">
        <h3 class="text-sm font-bold text-white mb-4">Preview Data</h3>
        <div class="overflow-x-auto">
          <table class="data-table text-xs">
            <thead><tr><th>Nama</th><th>Total Sesi</th><th>Total Jam</th><th>Avg Durasi</th><th>Skor</th><th>Konsistensi</th><th>Frekuensi/Minggu</th><th>Status</th></tr></thead>
            <tbody>
              ${students.map(s=>{const a=DB.analisis[s.id]?.polaBelajar||AIEngine.emptyAnalysis();return `<tr>
                <td class="font-medium text-white">${s.name}</td>
                <td>${a.totalSessions}</td><td>${a.totalJam}</td><td>${a.avgDurasi}m</td>
                <td style="color:${scoreColor(a.skor)};font-weight:700;">${a.skor}</td>
                <td>${a.consistencyScore}</td><td>${a.freqPerWeek}</td>
                <td>${AIEngine.isAtRisk(a)?'<span class="badge badge-red">Bermasalah</span>':'<span class="badge badge-green">Aktif</span>'}</td>
              </tr>`;}).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  },

  exportCSV() {
    const students = Object.values(DB.users).filter(u=>u.role==='student');
    const header = ['Nama','Email','Total Sesi','Total Jam','Avg Durasi (menit)','Skor','Konsistensi','Frekuensi/Minggu','Tipe Belajar','Tren','Status'];
    const rows = students.map(s=>{
      const a = DB.analisis[s.id]?.polaBelajar || AIEngine.emptyAnalysis();
      return [s.name,s.email,a.totalSessions,a.totalJam,a.avgDurasi,a.skor,a.consistencyScore,a.freqPerWeek,a.tipeBelajar,a.tren,AIEngine.isAtRisk(a)?'Bermasalah':'Aktif'].join(',');
    });
    const csv = [header.join(','),...rows].join('\n');
    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `EduPattern_Laporan_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    toast('📄 File CSV berhasil diunduh!');
  },

  exportJSON() {
    const students = Object.values(DB.users).filter(u=>u.role==='student');
    const data = students.map(s=>({...s,password:undefined,analisis:DB.analisis[s.id]||null}));
    const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `EduPattern_Data_${new Date().toISOString().slice(0,10)}.json`;
    link.click();
    toast('📦 File JSON berhasil diunduh!');
  }
};

/* ================================================================
   AUTH HANDLERS
================================================================ */
function switchAuthTab(tab) {
  const isLogin = tab==='login';
  document.getElementById('tabLogin').classList.toggle('active',isLogin);
  document.getElementById('tabRegister').classList.toggle('active',!isLogin);
  document.getElementById('loginForm').classList.toggle('hidden',!isLogin);
  document.getElementById('registerForm').classList.toggle('hidden',isLogin);
}

function fillDemo(role) {
  if(role==='student'){document.getElementById('loginEmail').value='student@demo.com';document.getElementById('loginPass').value='password123';}
  else{document.getElementById('loginEmail').value='dosen@demo.com';document.getElementById('loginPass').value='password123';}
  switchAuthTab('login');
  toast('Akun demo terisi. Klik Masuk!','info');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Memproses...';
  try { await App.login(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); }
  catch(err) { toast(err.message,'error'); }
  btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard';
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Mendaftar...';
  try { await App.register(document.getElementById('regName').value, document.getElementById('regEmail').value, document.getElementById('regPass').value, document.getElementById('regRole').value); }
  catch(err) { toast(err.message,'error'); }
  btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-user-plus"></i> Buat Akun';
}

/* ================================================================
   INIT
================================================================ */
document.addEventListener('DOMContentLoaded', ()=>App.init());
</script>
