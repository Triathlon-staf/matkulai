<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduPattern AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, set, get, push, onValue, update, remove, serverTimestamp, query, orderByChild, equalTo }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDemoKeyReplace",
      authDomain: "tugas-6946a.firebaseapp.com",
      databaseURL: "https://tugas-6946a-default-rtdb.asia-southeast1.firebaseapp.com",
      projectId: "tugas-6946a",
      storageBucket: "tugas-6946a.appspot.com",
      messagingSenderId: "000000000",
      appId: "1:000000000:web:000000"
    };

    let app, auth, db;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getDatabase(app);
    } catch(e) {
      console.warn("Firebase init failed, using mock mode:", e.message);
    }

    window._firebase = { auth, db, ref, set, get, push, onValue, update, remove, serverTimestamp, query, orderByChild, equalTo,
      createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged };
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['Syne','sans-serif'], body: ['Outfit','sans-serif'] },
          colors: {
            gold: { 300:'#fde68a',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309' },
            ink: { 950:'#04040a',900:'#080810',800:'#0e0e1a',700:'#141424',600:'#1c1c2e',500:'#242438',400:'#2e2e48' }
          }
        }
      }
    };
  </script>

  <style>
    :root { --gold:#f59e0b; --em:#10b981; --rose:#f43f5e; --violet:#8b5cf6; --sky:#0ea5e9; }
    *{ scrollbar-width:thin; scrollbar-color:#2e2e48 transparent; box-sizing:border-box; }
    body{ font-family:'Outfit',sans-serif; background:#04040a; color:#e2e2f0; overflow-x:hidden; margin:0; }
    h1,h2,h3,h4,h5,h6{ font-family:'Syne',sans-serif; }
    .mesh-bg{ position:fixed; inset:0; z-index:0; pointer-events:none;
      background: radial-gradient(ellipse 700px 500px at 10% 20%,rgba(245,158,11,.055) 0%,transparent 60%),
        radial-gradient(ellipse 500px 500px at 90% 80%,rgba(139,92,246,.04) 0%,transparent 60%),
        radial-gradient(ellipse 400px 300px at 50% 50%,rgba(14,165,233,.025) 0%,transparent 70%); }
    .grid-lines{ position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.018;
      background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);
      background-size:60px 60px; }
    .card{ background:rgba(14,14,26,.8); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.055); border-radius:16px; transition:border-color .25s; }
    .card:hover{ border-color:rgba(245,158,11,.15); }
    .card-s{ background:rgba(14,14,26,.9); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.055); border-radius:16px; }
    .nav-item{ display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:10px; font-size:13px; font-weight:500; color:#9090b0; cursor:pointer; transition:all .2s; border:1px solid transparent; background:transparent; width:100%; text-align:left; }
    .nav-item:hover{ color:#e2e2f0; background:rgba(255,255,255,.04); }
    .nav-item.active{ color:#f59e0b; background:rgba(245,158,11,.1); border-color:rgba(245,158,11,.2); }
    .nav-item .ico{ width:26px; height:26px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; background:rgba(255,255,255,.05); }
    .nav-item.active .ico{ background:rgba(245,158,11,.15); color:#f59e0b; }
    .nav-sec{ font-size:9.5px; font-weight:700; letter-spacing:.12em; color:#40405a; text-transform:uppercase; padding:12px 12px 5px; }
    .btn-g{ background:linear-gradient(135deg,#f59e0b,#d97706); color:#1a0e00; font-weight:700; font-family:'Syne',sans-serif; border:none; cursor:pointer; border-radius:10px; transition:all .2s; }
    .btn-g:hover{ box-shadow:0 0 24px rgba(245,158,11,.35); transform:translateY(-1px); }
    .btn-g:disabled{ opacity:.5; transform:none; box-shadow:none; }
    .btn-gh{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); color:#9090b0; border-radius:10px; cursor:pointer; transition:all .2s; }
    .btn-gh:hover{ background:rgba(255,255,255,.08); color:#e2e2f0; }
    .inp{ background:rgba(8,8,16,.8); border:1px solid rgba(255,255,255,.08); color:#e2e2f0; border-radius:10px; padding:9px 13px; font-size:13.5px; font-family:'Outfit',sans-serif; width:100%; transition:border-color .2s; }
    .inp:focus{ outline:none; border-color:#f59e0b; box-shadow:0 0 0 3px rgba(245,158,11,.1); }
    .inp::placeholder{ color:#40405a; }
    select.inp option{ background:#0e0e1a; }
    input[type="range"]{ -webkit-appearance:none; background:transparent; border:none; width:100%; }
    input[type="range"]::-webkit-slider-track{ height:5px; background:#242438; border-radius:3px; }
    input[type="range"]::-webkit-slider-thumb{ -webkit-appearance:none; width:17px; height:17px; border-radius:50%; background:#f59e0b; cursor:pointer; margin-top:-6px; box-shadow:0 0 8px rgba(245,158,11,.5); }
    .badge{ display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:999px; font-size:10.5px; font-weight:600; }
    .bg{ background:rgba(16,185,129,.12); color:#10b981; border:1px solid rgba(16,185,129,.2); }
    .br{ background:rgba(244,63,94,.12); color:#f43f5e; border:1px solid rgba(244,63,94,.2); }
    .bgo{ background:rgba(245,158,11,.12); color:#f59e0b; border:1px solid rgba(245,158,11,.2); }
    .bv{ background:rgba(139,92,246,.12); color:#8b5cf6; border:1px solid rgba(139,92,246,.2); }
    .bsk{ background:rgba(14,165,233,.12); color:#0ea5e9; border:1px solid rgba(14,165,233,.2); }
    .pbar{ height:5px; background:#1c1c2e; border-radius:3px; overflow:hidden; }
    .pfill{ height:100%; border-radius:3px; transition:width 1s ease; }
    .dt{ width:100%; border-collapse:collapse; }
    .dt th{ font-size:10.5px; font-weight:600; color:#40405a; text-transform:uppercase; letter-spacing:.08em; padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.06); text-align:left; }
    .dt td{ padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.04); font-size:13px; color:#a0a0c0; }
    .dt tr:last-child td{ border-bottom:none; }
    .dt tbody tr{ cursor:pointer; transition:background .15s; }
    .dt tbody tr:hover{ background:rgba(245,158,11,.03); }
    .tab-s{ display:flex; gap:3px; background:rgba(8,8,16,.8); padding:3px; border-radius:11px; border:1px solid rgba(255,255,255,.06); }
    .tab-b{ flex:1; padding:7px 10px; border-radius:8px; font-size:12.5px; font-weight:600; font-family:'Syne',sans-serif; border:none; cursor:pointer; transition:all .2s; color:#60607a; background:transparent; }
    .tab-b.active{ background:rgba(245,158,11,.15); color:#f59e0b; }
    @keyframes fadeUp{ from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn{ from{opacity:0}to{opacity:1} }
    @keyframes spin{ to{transform:rotate(360deg)} }
    @keyframes toastIn{ from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1} }
    @keyframes toastOut{ to{transform:translateX(120%);opacity:0} }
    @keyframes pulse-ring{ 0%{box-shadow:0 0 0 0 rgba(245,158,11,.3)}70%{box-shadow:0 0 0 8px rgba(245,158,11,0)}100%{box-shadow:0 0 0 0 rgba(245,158,11,0)} }
    .fu{ animation:fadeUp .38s ease-out both; }
    .fi{ animation:fadeIn .3s ease both; }
    .s1{animation-delay:.04s}.s2{animation-delay:.08s}.s3{animation-delay:.12s}.s4{animation-delay:.16s}.s5{animation-delay:.2s}
    .toast{ animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) both; }
    .toast.out{ animation:toastOut .3s ease forwards; }
    .spinner{ width:18px; height:18px; border:2px solid rgba(255,255,255,.1); border-top-color:#f59e0b; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
    .stat-n{ font-family:'Syne',sans-serif; font-size:24px; font-weight:800; line-height:1; }
    .score-track{ fill:none; stroke:rgba(255,255,255,.05); stroke-width:9; }
    .score-fill{ fill:none; stroke-width:9; stroke-linecap:round; transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1); }
    .pomo-ring{ transform:rotate(-90deg); transform-origin:center; }
    .pomo-track{ fill:none; stroke:#1c1c2e; stroke-width:11; }
    .pomo-fill{ fill:none; stroke-width:11; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
    .chat-msg{ max-width:84%; }
    .chat-msg.u{ margin-left:auto; background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.2); border-radius:14px 14px 4px 14px; }
    .chat-msg.ai{ background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:14px 14px 14px 4px; }
    .chat-scroll{ height:320px; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:9px; }
    .sidebar{ position:fixed; left:0; top:0; bottom:0; width:215px; z-index:50; transition:transform .3s; }
    @media(max-width:768px){ .sidebar{transform:translateX(-100%)} .sidebar.open{transform:translateX(0)} .main-a{margin-left:0!important} }
    ::-webkit-scrollbar{ width:4px; height:4px; }
    ::-webkit-scrollbar-thumb{ background:#242438; border-radius:2px; }

    /* Library card */
    .book-card{ background:rgba(14,14,26,.7); border:1px solid rgba(255,255,255,.06); border-radius:14px; padding:14px; transition:all .2s; cursor:pointer; }
    .book-card:hover{ border-color:rgba(245,158,11,.25); transform:translateY(-2px); }
    .book-spine{ width:8px; border-radius:4px; flex-shrink:0; }

    /* Activity monitor */
    .act-row{ display:flex; align-items:center; gap:12px; padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.04); }
    .act-row:last-child{ border-bottom:none; }
    .act-icon{ width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px; }

    /* Class card */
    .class-card{ background:rgba(14,14,26,.7); border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:16px; transition:all .2s; }
    .class-card:hover{ border-color:rgba(245,158,11,.2); }

    /* Invite code */
    .invite-code{ font-family:'Syne',sans-serif; font-size:26px; font-weight:800; letter-spacing:.25em; color:#f59e0b; text-shadow:0 0 20px rgba(245,158,11,.3); }

    /* Auth orb */
    .orb{ width:300px; height:300px; border-radius:50%; position:absolute; filter:blur(80px); pointer-events:none; }

    /* Notification */
    .ndot{ width:6px; height:6px; background:#f43f5e; border-radius:50%; position:absolute; top:3px; right:3px; animation:pulse-ring 2s infinite; }
  </style>
</head>
<body>
<div class="mesh-bg"></div>
<div class="grid-lines"></div>
<div id="toastCont" class="fixed top-4 right-4 z-[999] flex flex-col gap-2" style="max-width:320px;"></div>

<!-- ==================== AUTH ==================== -->
<div id="authPage" class="relative z-10 min-h-screen flex items-center justify-center p-4">
  <div class="orb" style="background:rgba(245,158,11,.07);top:-80px;left:-100px;"></div>
  <div class="orb" style="background:rgba(139,92,246,.05);bottom:-60px;right:-80px;width:240px;height:240px;"></div>
  <div class="w-full max-w-[420px] relative z-10">
    <div class="text-center mb-7 fu">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style="background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.06));border:1px solid rgba(245,158,11,.25);">
        <i class="fa-solid fa-brain text-xl text-gold-400"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">EduPattern <span class="text-gold-400">AI</span></h1>
      <p class="text-sm text-[#60607a] mt-1 font-medium">Platform Analisis Pola Belajar Cerdas</p>
    </div>
    <div class="card p-6 fu s1" style="box-shadow:0 0 40px rgba(245,158,11,.07);">
      <div class="tab-s mb-5">
        <button onclick="switchAuthTab('login')" class="tab-b active" id="tLogin">Masuk</button>
        <button onclick="switchAuthTab('register')" class="tab-b" id="tReg">Daftar</button>
      </div>
      <!-- Login -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold text-[#60607a] uppercase tracking-wider mb-1.5">Email</label>
            <input type="email" id="lEmail" required class="inp" placeholder="email@contoh.com"/>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-[#60607a] uppercase tracking-wider mb-1.5">Password</label>
            <div class="relative">
              <input type="password" id="lPass" required class="inp pr-10" placeholder="••••••••"/>
              <button type="button" onclick="togglePw('lPass',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#50506a] hover:text-[#9090b0]"><i class="fa-solid fa-eye text-sm"></i></button>
            </div>
          </div>
          <button type="submit" id="lBtn" class="btn-g w-full py-3 text-sm flex items-center justify-center gap-2">
            <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard
          </button>
        </div>
      </form>
      <!-- Register -->
      <form id="regForm" onsubmit="handleRegister(event)" class="hidden">
        <div class="space-y-3">
          <div>
            <label class="block text-[10px] font-bold text-[#60607a] uppercase tracking-wider mb-1.5">Nama Lengkap</label>
            <input type="text" id="rName" required class="inp" placeholder="Nama lengkap Anda"/>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-[#60607a] uppercase tracking-wider mb-1.5">Email</label>
            <input type="email" id="rEmail" required class="inp" placeholder="email@contoh.com"/>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-[#60607a] uppercase tracking-wider mb-1.5">Password</label>
            <div class="relative">
              <input type="password" id="rPass" required minlength="6" class="inp pr-10" placeholder="Min. 6 karakter"/>
              <button type="button" onclick="togglePw('rPass',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#50506a] hover:text-[#9090b0]"><i class="fa-solid fa-eye text-sm"></i></button>
            </div>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-[#60607a] uppercase tracking-wider mb-1.5">Peran</label>
            <select id="rRole" class="inp">
              <option value="student">👨‍🎓 Mahasiswa</option>
              <option value="lecturer">👨‍🏫 Dosen</option>
            </select>
          </div>
          <button type="submit" id="rBtn" class="btn-g w-full py-3 text-sm flex items-center justify-center gap-2">
            <i class="fa-solid fa-user-plus"></i> Buat Akun
          </button>
        </div>
      </form>
    </div>
    <div class="card p-4 mt-3 fu s2">
      <p class="text-xs text-[#50506a] mb-2 flex items-center gap-2"><i class="fa-solid fa-flask-vial text-gold-400"></i><span class="font-semibold">Demo — klik untuk isi otomatis</span></p>
      <div class="flex gap-2">
        <button onclick="fillDemo('student')" class="btn-gh flex-1 py-2 text-xs flex items-center justify-center gap-1.5"><i class="fa-solid fa-graduation-cap text-gold-400"></i> Mahasiswa</button>
        <button onclick="fillDemo('lecturer')" class="btn-gh flex-1 py-2 text-xs flex items-center justify-center gap-1.5"><i class="fa-solid fa-chalkboard-user text-violet-400"></i> Dosen</button>
      </div>
    </div>
  </div>
</div>

<!-- ==================== STUDENT DASHBOARD ==================== -->
<div id="stuDash" class="relative z-10 hidden">
  <div class="md:hidden fixed top-0 inset-x-0 z-50 card-s px-4 py-3 flex items-center justify-between" style="border-radius:0;border-left:0;border-right:0;border-top:0;">
    <button onclick="toggleSB('stuSB','stuOV')" class="text-[#70709a] hover:text-gold-400 transition-colors"><i class="fa-solid fa-bars text-lg"></i></button>
    <span class="font-display font-bold text-sm text-white">EduPattern <span class="text-gold-400">AI</span></span>
    <button onclick="App.logout()" class="text-[#70709a] hover:text-rose-400 transition-colors"><i class="fa-solid fa-right-from-bracket"></i></button>
  </div>
  <aside id="stuSB" class="sidebar card-s flex flex-col" style="border-radius:0;border-top:0;border-bottom:0;border-left:0;">
    <div class="p-4 border-b border-white/5">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.06));border:1px solid rgba(245,158,11,.2);">
          <i class="fa-solid fa-brain text-gold-400 text-sm"></i>
        </div>
        <div><h2 class="font-display font-bold text-sm text-white">EduPattern</h2><p class="text-[9px] text-[#50506a] font-bold uppercase tracking-wider">Student</p></div>
      </div>
    </div>
    <nav class="flex-1 py-3 px-3 space-y-0.5 overflow-y-auto">
      <p class="nav-sec">Menu</p>
      <button onclick="SV.tab('overview')" data-tab="overview" class="nav-item active"><span class="ico"><i class="fa-solid fa-house-chimney"></i></span> Beranda</button>
      <button onclick="SV.tab('input')" data-tab="input" class="nav-item"><span class="ico"><i class="fa-solid fa-pen-to-square"></i></span> Input Aktivitas</button>
      <button onclick="SV.tab('patterns')" data-tab="patterns" class="nav-item"><span class="ico"><i class="fa-solid fa-chart-line"></i></span> Pola Belajar</button>
      <button onclick="SV.tab('recs')" data-tab="recs" class="nav-item"><span class="ico"><i class="fa-solid fa-lightbulb"></i></span> Rekomendasi</button>
      <p class="nav-sec">Kelas & Belajar</p>
      <button onclick="SV.tab('classes')" data-tab="classes" class="nav-item"><span class="ico"><i class="fa-solid fa-chalkboard"></i></span> Kelas Saya</button>
      <button onclick="SV.tab('library')" data-tab="library" class="nav-item"><span class="ico"><i class="fa-solid fa-book-open"></i></span> Perpustakaan</button>
      <p class="nav-sec">Tools</p>
      <button onclick="SV.tab('pomodoro')" data-tab="pomodoro" class="nav-item"><span class="ico"><i class="fa-solid fa-clock-rotate-left"></i></span> Pomodoro</button>
      <button onclick="SV.tab('goals')" data-tab="goals" class="nav-item"><span class="ico"><i class="fa-solid fa-bullseye"></i></span> Target Belajar</button>
      <button onclick="SV.tab('chat')" data-tab="chat" class="nav-item"><span class="ico"><i class="fa-solid fa-robot"></i></span> AI Tutor</button>
      <button onclick="SV.tab('monitor')" data-tab="monitor" class="nav-item"><span class="ico"><i class="fa-solid fa-eye"></i></span> Aktivitas Saya</button>
      <button onclick="SV.tab('calendar')" data-tab="calendar" class="nav-item"><span class="ico"><i class="fa-solid fa-calendar-days"></i></span> Kalender</button>
    </nav>
    <div class="p-4 border-t border-white/5">
      <div class="flex items-center gap-3 mb-3">
        <div id="stuAvatar" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a0e00;">BS</div>
        <div class="flex-1 min-w-0"><p id="stuName" class="text-xs font-semibold text-white truncate">Mahasiswa</p><p class="text-[10px] text-[#50506a]">Student</p></div>
      </div>
      <button onclick="App.logout()" class="btn-gh w-full py-2 text-xs flex items-center justify-center gap-2 hover:!text-rose-400"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>
  </aside>
  <div id="stuOV" onclick="toggleSB('stuSB','stuOV')" class="hidden fixed inset-0 bg-black/60 z-40 md:hidden"></div>
  <main class="main-a min-h-screen pb-8 px-5 pt-5" style="margin-left:215px;">
    <div class="md:hidden h-12 mb-2"></div>
    <div id="stuCont" class="max-w-5xl mx-auto"></div>
  </main>
</div>

<!-- ==================== LECTURER DASHBOARD ==================== -->
<div id="lectDash" class="relative z-10 hidden">
  <div class="md:hidden fixed top-0 inset-x-0 z-50 card-s px-4 py-3 flex items-center justify-between" style="border-radius:0;border-left:0;border-right:0;border-top:0;">
    <button onclick="toggleSB('lectSB','lectOV')" class="text-[#70709a] hover:text-violet-400 transition-colors"><i class="fa-solid fa-bars text-lg"></i></button>
    <span class="font-display font-bold text-sm text-white">EduPattern <span class="text-gold-400">AI</span></span>
    <button onclick="App.logout()" class="text-[#70709a] hover:text-rose-400"><i class="fa-solid fa-right-from-bracket"></i></button>

<script>
/* ================================================================
   FIREBASE BRIDGE (real DB with in-memory fallback)
================================================================ */
const FB = {
  get auth(){ return window._firebase?.auth||null; },
  get db(){ return window._firebase?.db||null; },
  _mock: {users:{},activities:[],analysis:{},goals:{},classes:{},announcements:[],books:[],activityLog:[]},

  /* helpers */
  async _fbSet(path, data){ if(!this.db) return; const {ref,set}=window._firebase; await set(ref(this.db,path),data); },
  async _fbGet(path){ if(!this.db) return null; const {ref,get}=window._firebase; const s=await get(ref(this.db,path)); return s.exists()?s.val():null; },
  async _fbPush(path, data){ if(!this.db) return 'mock_'+Date.now(); const {ref,push}=window._firebase; const r=await push(ref(this.db,path),data); return r.key; },
  async _fbUpdate(path, data){ if(!this.db) return; const {ref,update}=window._firebase; await update(ref(this.db,path),data); },
  async _fbRemove(path){ if(!this.db) return; const {ref,remove}=window._firebase; await remove(ref(this.db,path)); },

  /* AUTH */
  async signIn(email,pw){
    if(this.auth){
      try{ const r=await window._firebase.signInWithEmailAndPassword(this.auth,email,pw);
        const profile=await this._fbGet(`users/${r.user.uid}`);
        return{uid:r.user.uid,email,displayName:profile?.name||email,role:profile?.role||'student'};
      }catch(e){ throw new Error(e.message); }
    }
    // mock
    const u=Object.values(this._mock.users).find(u=>u.email===email);
    if(!u) throw new Error('Akun tidak ditemukan');
    if(u.password!==pw) throw new Error('Password salah');
    return{uid:u.id,email:u.email,displayName:u.name,role:u.role};
  },
  async signUp(name,email,pw,role){
    if(this.auth){
      try{ const r=await window._firebase.createUserWithEmailAndPassword(this.auth,email,pw);
        await this._fbSet(`users/${r.user.uid}`,{name,email,role,createdAt:new Date().toISOString()});
        return{uid:r.user.uid,email,displayName:name,role};
      }catch(e){ throw new Error(e.message); }
    }
    if(Object.values(this._mock.users).find(u=>u.email===email)) throw new Error('Email sudah terdaftar');
    const id='u_'+Date.now(); this._mock.users[id]={id,name,email,password:pw,role}; return{uid:id,email,displayName:name,role};
  },
  async signOut(){ if(this.auth) await window._firebase.signOut(this.auth); },

  /* ACTIVITIES */
  async getActivities(uid){
    if(this.db){ const d=await this._fbGet(`activities/${uid}`); return d?Object.values(d).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)):[];}
    return this._mock.activities.filter(a=>a.userId===uid).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  },
  async addActivity(data){
    const doc={...data,timestamp:data.timestamp||new Date().toISOString()};
    if(this.db){ const k=await this._fbPush(`activities/${data.userId}`,doc); doc.id=k; await this._updateAnalysis(data.userId); return doc;}
    doc.id='act_'+Date.now(); this._mock.activities.push(doc); await this._updateAnalysis(data.userId); return doc;
  },

  /* ANALYSIS */
  async _updateAnalysis(uid){
    const acts=await this.getActivities(uid);
    const pol=AIEngine.analyzePatterns(acts);
    const rec=AIEngine.generateRecommendations(pol);
    const obj={polaBelajar:pol,rekomendasi:rec,updatedAt:new Date().toISOString()};
    if(this.db) await this._fbSet(`analysis/${uid}`,obj);
    else this._mock.analysis[uid]=obj;
  },
  async getAnalysis(uid){
    if(this.db) return await this._fbGet(`analysis/${uid}`);
    return this._mock.analysis[uid]||null;
  },

  /* GOALS */
  async getGoals(uid){
    if(this.db){ const d=await this._fbGet(`goals/${uid}`); return d?Object.entries(d).map(([k,v])=>({id:k,...v})):[];}

  },
  async saveGoal(uid,goal){
    const{id,...data}=goal;
    if(this.db){ if(id&&!id.startsWith('new_')) await this._fbUpdate(`goals/${uid}/${id}`,data); else{ const k=await this._fbPush(`goals/${uid}`,data); goal.id=k; } return goal;}
    if(!this._mock.goals[uid]) this._mock.goals[uid]=[];
    const i=this._mock.goals[uid].findIndex(g=>g.id===id);
    if(i>=0) this._mock.goals[uid][i]=goal; else this._mock.goals[uid].push(goal);
    return goal;
  },
  async deleteGoal(uid,gid){
    if(this.db) await this._fbRemove(`goals/${uid}/${gid}`);
    else this._mock.goals[uid]=(this._mock.goals[uid]||[]).filter(g=>g.id!==gid);
  },

  /* CLASSES */
  async createClass(lectUid,data){
    const code=this._genCode();

  },
  async getClassesByLecturer(lectUid){
    if(this.db){ const d=await this._fbGet('classes'); if(!d) return []; return Object.entries(d).filter(([,v])=>v.lecturerUid===lectUid).map(([k,v])=>({id:k,...v})); }
    return Object.values(this._mock.classes).filter(c=>c.lecturerUid===lectUid);
  },
  async getClassesByStudent(uid){
    if(this.db){ const d=await this._fbGet('classes'); if(!d) return []; return Object.entries(d).filter(([,v])=>v.students&&v.students[uid]).map(([k,v])=>({id:k,...v})); }
    return Object.values(this._mock.classes).filter(c=>c.students&&c.students[uid]);
  },
  async joinClass(uid,uname,code){
    if(this.db){
      const d=await this._fbGet('classes'); if(!d) throw new Error('Kode tidak valid');
      const entry=Object.entries(d).find(([,v])=>v.code===code.toUpperCase());
      if(!entry) throw new Error('Kode kelas tidak ditemukan');
      const[cid]=entry;
      await this._fbUpdate(`classes/${cid}/students/${uid}`,{name:uname,joinedAt:new Date().toISOString()});
      return{id:cid,...entry[1]};
    }
    const cls=Object.values(this._mock.classes).find(c=>c.code===code.toUpperCase());
    if(!cls) throw new Error('Kode kelas tidak ditemukan');
    if(!cls.students) cls.students={};
    cls.students[uid]={name:uname,joinedAt:new Date().toISOString()};
    return cls;
  },
  async deleteClass(cid){
    if(this.db) await this._fbRemove(`classes/${cid}`);

  },
  _genCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); },

  /* BOOKS / LIBRARY */

      {id:'bk2',title:'Kalkulus Jilid 1',author:'James Stewart',subject:'Matematika',category:'Matematika',pages:520,description:'Kalkulus limit, turunan, dan integral dasar',cover:'#f59e0b',reads:98,downloads:76,addedAt:'2026-01-02'},
      {id:'bk3',title:'Basis Data Relasional',author:'Raghu Ramakrishnan',subject:'Basis Data',category:'Informatika',pages:440,description:'Teori dan praktik sistem manajemen basis data',cover:'#10b981',reads:87,downloads:65,addedAt:'2026-01-03'},
      {id:'bk4',title:'Jaringan Komputer',author:'Andrew Tanenbaum',subject:'Jaringan Komputer',category:'Informatika',pages:620,description:'Konsep dan protokol jaringan komputer modern',cover:'#0ea5e9',reads:72,downloads:54,addedAt:'2026-01-04'},
      {id:'bk5',title:'Statistika Terapan',author:'Walpole & Myers',subject:'Statistika',category:'Matematika',pages:350,description:'Probabilitas dan statistika untuk sains dan teknik',cover:'#f43f5e',reads:65,downloads:48,addedAt:'2026-01-05'},

  },

  /* ACTIVITY LOG (game monitoring etc) */
  async logActivity(uid,data){
    const entry={...data,userId:uid,timestamp:data.timestamp||new Date().toISOString()};
    if(this.db) await this._fbPush(`activityLog/${uid}`,entry);
    else this._mock.activityLog.push(entry);

  async getActivityLog(uid){
    if(this.db){ const d=await this._fbGet(`activityLog/${uid}`); return d?Object.values(d).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,50):[];}
    return this._mock.activityLog.filter(a=>a.userId===uid).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,50);

  async getAllActivityLogs(){ // for lecturer
    if(this.db){ const d=await this._fbGet('activityLog'); if(!d) return []; return Object.values(d).flatMap(u=>Object.values(u)).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)); }
    return this._mock.activityLog.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  },

  /* ANNOUNCEMENTS */
  async getAnnouncements(){
    if(this.db){ const d=await this._fbGet('announcements'); return d?Object.entries(d).map(([k,v])=>({id:k,...v})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)):[];}
    return(this._mock.announcements||[]);
  },
  async addAnnouncement(data){
    const doc={...data,createdAt:new Date().toISOString()};
    if(this.db){ const k=await this._fbPush('announcements',doc); return{id:k,...doc};}
    const d={id:'ann_'+Date.now(),...doc}; if(!this._mock.announcements) this._mock.announcements=[]; this._mock.announcements.unshift(d); return d;
  },

  /* USER PROFILE */
  async getUserProfile(uid){
    if(this.db) return await this._fbGet(`users/${uid}`);
    return this._mock.users[uid]||null;
  },
  async getAllStudents(){
    if(this.db){ const d=await this._fbGet('users'); if(!d) return []; return Object.entries(d).filter(([,v])=>v.role==='student').map(([k,v])=>({id:k,...v}));}
    return Object.values(this._mock.users).filter(u=>u.role==='student');
  },
};

/* ================================================================
   AI ENGINE
================================================================ */
const AIEngine = {
  analyzePatterns(acts){
    if(!acts.length) return this.empty();
    const now=new Date(); const wms=7*86400000;
    const ts={pagi:0,siang:0,sore:0,malam:0,larut:0};
    let total=0; const durs=[];
    const mc={}; const dh={};
    acts.forEach(a=>{
      const d=new Date(a.timestamp); const h=d.getHours();
      total+=a.durasi; durs.push(a.durasi);
      mc[a.materi]=(mc[a.materi]||0)+1;
      const k=d.toISOString().slice(0,10); dh[k]=(dh[k]||0)+a.durasi;
      if(h>=6&&h<12) ts.pagi++; else if(h>=12&&h<15) ts.siang++; else if(h>=15&&h<18) ts.sore++; else if(h>=18&&h<22) ts.malam++; else ts.larut++;
    });
    const maxSlot=Object.entries(ts).sort((a,b)=>b[1]-a[1])[0];
    const typeMap={pagi:'Pagi Hari (06-12)',siang:'Siang Hari (12-15)',sore:'Sore Hari (15-18)',malam:'Malam Hari (18-22)',larut:'Larut Malam (22-06)'};
    const avg=total/acts.length;
    const std=Math.sqrt(durs.reduce((s,d)=>s+Math.pow(d-avg,2),0)/durs.length);
    const dv=Object.values(dh); const avgD=dv.reduce((s,v)=>s+v,0)/dv.length;
    const stdD=Math.sqrt(dv.reduce((s,v)=>s+Math.pow(v-avgD,2),0)/dv.length);
    const cs=Math.max(0,Math.min(100,Math.round(100-(stdD/Math.max(1,avgD))*100)));
    const ks=cs>=70?'Konsisten':cs>=40?'Cukup Konsisten':'Tidak Konsisten';
    const ds=Math.max(1,Math.ceil((now-new Date(acts[acts.length-1].timestamp))/86400000));
    const fw=Math.round((acts.length/ds)*70)/10;
    const tm=Object.entries(mc).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const w1=acts.filter(a=>now-new Date(a.timestamp)<wms);
    const w2=acts.filter(a=>{const d=now-new Date(a.timestamp);return d>=wms&&d<2*wms;});
    const aw1=w1.length?w1.reduce((s,a)=>s+a.durasi,0)/w1.length:0;
    const aw2=w2.length?w2.reduce((s,a)=>s+a.durasi,0)/w2.length:0;
    const tp=aw2>0?Math.round(((aw1-aw2)/aw2)*100):w1.length>0?30:0;

    return r;
  },
  isAtRisk(a){
    if(!a||a.totalSessions===0) return true;
    let s=0;
    if(a.freqPerWeek<3) s+=3; else if(a.freqPerWeek<5) s++;

    if(s>=7) return'high'; if(s>=4) return'medium'; return'low';
  }
};

const delay = ms=>new Promise(r=>setTimeout(r,ms));
function toast(msg,type='success',dur=3500){
  const el=document.createElement('div');
  const cfg={success:{bg:'rgba(16,185,129,.12)',br:'rgba(16,185,129,.25)',ico:'fa-check-circle text-emerald-400'},error:{bg:'rgba(244,63,94,.12)',br:'rgba(244,63,94,.25)',ico:'fa-times-circle text-rose-400'},info:{bg:'rgba(14,165,233,.12)',br:'rgba(14,165,233,.25)',ico:'fa-info-circle text-sky-400'},warn:{bg:'rgba(245,158,11,.12)',br:'rgba(245,158,11,.25)',ico:'fa-exclamation-triangle text-gold-400'}};
  const c=cfg[type]||cfg.success;
  el.className='toast flex items-center gap-3 px-4 py-3 rounded-2xl text-sm text-gray-200';
  el.style.cssText=`background:${c.bg};border:1px solid ${c.br};backdrop-filter:blur(20px);`;
  el.innerHTML=`<i class="fa-solid ${c.ico} text-base flex-shrink-0"></i><span style="font-family:'Outfit',sans-serif;">${msg}</span>`;
  document.getElementById('toastCont').appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300);},dur);
}
function fmtTime(iso){ const d=new Date(iso); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}); }
function initials(n){ return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function scC(s){ return s>=70?'#10b981':s>=40?'#f59e0b':'#f43f5e'; }
function scL(s){ return s>=70?'Baik':s>=40?'Cukup':'Perlu Perhatian'; }
let charts={};

function statCard(ico,lbl,val,color,bg){
  return `<div class="card p-4"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background:${bg};"><i class="fa-solid ${ico}" style="color:${color};font-size:14px;"></i></div><div><p class="text-[10px] font-semibold uppercase tracking-wider" style="color:#50506a;">${lbl}</p><p class="font-display font-bold text-white text-[14px] mt-0.5">${val}</p></div></div></div>`;
}
function scoreRing(s){
  const r=44,c=2*Math.PI*r,off=c*(1-s/100),col=scC(s);
  return `<svg viewBox="0 0 100 100" width="90" height="90"><circle class="score-track" cx="50" cy="50" r="${r}"/><circle class="score-fill" cx="50" cy="50" r="${r}" stroke="${col}" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 50 50)"/><text x="50" y="46" text-anchor="middle" font-family="Syne" font-size="17" font-weight="800" fill="white">${s}</text><text x="50" y="58" text-anchor="middle" font-family="Outfit" font-size="8.5" fill="#60607a">/ 100</text></svg>`;
}

const Pomo={timer:null,tl:25*60,mode:'focus',run:false,fm:25,bm:5,lbm:15,sc:0,onTick:null,
  start(){ if(this.run) return; this.run=true; this.timer=setInterval(()=>{this.tl--;if(this.onTick)this.onTick();if(this.tl<=0)this.complete();},1000); },
  pause(){ clearInterval(this.timer);this.run=false;if(this.onTick)this.onTick(); },
  stop(){ clearInterval(this.timer);this.run=false;this.tl=this.fm*60;this.mode='focus';if(this.onTick)this.onTick(); },
  setMode(m){ this.pause();this.mode=m;this.tl=(m==='focus'?this.fm:m==='break'?this.bm:this.lbm)*60;if(this.onTick)this.onTick(); },
  complete(){ clearInterval(this.timer);this.run=false; toast(this.mode==='focus'?'🎉 Sesi fokus selesai! Ambil istirahat.':'☕ Istirahat selesai. Siap fokus lagi!','info'); if(this.mode==='focus'){this.sc++;this.mode=this.sc%4===0?'longbreak':'break';this.tl=(this.mode==='break'?this.bm:this.lbm)*60;}else{this.mode='focus';this.tl=this.fm*60;} if(this.onTick)this.onTick(); },
  fmt(){ const m=Math.floor(this.tl/60),s=this.tl%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; },
  prog(){ const t=(this.mode==='focus'?this.fm:this.mode==='break'?this.bm:this.lbm)*60; return 1-this.tl/t; }
};

  /* POMODORO */
  pomodoro(el){
    const upd=()=>{
      const te=document.getElementById('p_time'),fe=document.getElementById('p_fill'),be=document.getElementById('p_btn');
      if(!te) return;
      te.textContent=Pomo.fmt();
      const r=80,c=2*Math.PI*r;
      fe.setAttribute('stroke-dasharray',c);fe.setAttribute('stroke-dashoffset',c*(1-Pomo.prog()));
      be.innerHTML=Pomo.run?'<i class="fa-solid fa-pause mr-2"></i>Jeda':'<i class="fa-solid fa-play mr-2"></i>Mulai';
      const me=document.getElementById('p_mode');
      if(me) me.textContent=Pomo.mode==='focus'?'🎯 Fokus':Pomo.mode==='break'?'☕ Istirahat':'🛌 Istirahat Panjang';
      const se=document.getElementById('p_sess'); if(se) se.textContent=Pomo.sc;
    };
    Pomo.onTick=upd;
    const r=80,c=2*Math.PI*r;
    el.innerHTML=`<div class="fu"><div class="mb-5"><h2 class="text-xl font-bold text-white">Timer Pomodoro</h2><p class="text-sm text-[#60607a] mt-1">Tingkatkan fokus dengan teknik Pomodoro</p></div>
      <div class="grid md:grid-cols-2 gap-5">
        <div class="card p-8 flex flex-col items-center">
          <p id="p_mode" class="text-sm font-bold text-[#70709a] mb-5">${Pomo.mode==='focus'?'🎯 Fokus':'☕ Istirahat'}</p>
          <div class="relative mb-5">
            <svg width="196" height="196" viewBox="0 0 196 196" class="pomo-ring"><circle class="pomo-track" cx="98" cy="98" r="${r}"/><circle id="p_fill" class="pomo-fill" cx="98" cy="98" r="${r}" stroke="#f59e0b" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-Pomo.prog())}"/></svg>
            <div class="absolute inset-0 flex items-center justify-center"><div class="text-center"><p id="p_time" class="font-display font-bold text-white" style="font-size:42px;line-height:1;">${Pomo.fmt()}</p><p class="text-xs text-[#50506a] mt-1">Sesi <span id="p_sess">${Pomo.sc}</span></p></div></div>
          </div>
          <div class="flex gap-3 mb-4">
            <button id="p_btn" onclick="Pomo.run?Pomo.pause():Pomo.start()" class="btn-g px-8 py-3 text-sm"><i class="fa-solid fa-play mr-2"></i>Mulai</button>
            <button onclick="Pomo.stop()" class="btn-gh px-5 py-3 text-sm"><i class="fa-solid fa-stop"></i></button>
          </div>
          <div class="flex gap-2">
            <button onclick="Pomo.setMode('focus')" class="btn-gh px-3 py-2 text-xs">🎯 Fokus</button>
            <button onclick="Pomo.setMode('break')" class="btn-gh px-3 py-2 text-xs">☕ Istirahat</button>
            <button onclick="Pomo.setMode('longbreak')" class="btn-gh px-3 py-2 text-xs">🛌 Panjang</button>
          </div>
        </div>
        <div class="card p-6">

    return goals.map(g=>{

      return `<div class="class-card ${done?'goal-done':''}">
        <div class="flex items-start justify-between mb-3">
          <div><p class="text-sm font-bold text-white">${g.title}</p><p class="text-[10px] text-[#60607a] mt-0.5">Deadline: ${fmtDate(g.deadline)}</p></div>

  async saveGoal(e){
    e.preventDefault();

  async incrGoal(gid){
    const goals=await FB.getGoals(App.user.uid);
    const g=goals.find(g=>g.id===gid); if(!g) return;
    const inc=parseInt(prompt(`Progress: ${g.current}/${g.target} ${g.unit}\nTambah berapa?`)||'0');
    if(!inc||isNaN(inc)) return;
    g.current=Math.min(g.target,g.current+inc);
    if(g.current>=g.target){g.done=true;toast('🎉 Target tercapai! Luar biasa!');}
    else toast(`Progress: ${g.current}/${g.target} ${g.unit}`);

  async sendChat(){

    inp.value='';
    const chat=document.getElementById('chatMsgs');
    chat.innerHTML+=`<div class="chat-msg u p-3 text-sm text-white">${msg}</div>`;

    typing.innerHTML='<i class="fa-solid fa-ellipsis fa-beat-fade"></i> Mengetik...';

    else if(m.includes('konsentrasi')||m.includes('fokus')) resp='🧠 <strong>Meningkatkan Konsentrasi:</strong><br>• Tidur 7-8 jam<br>• Hindari multitasking<br>• Teknik Pomodoro<br>• Olahraga 30 menit/hari<br>• Meditasi mindfulness 10 menit<br>• Kurangi gula berlebihan';
    else if(m.includes('buku')||m.includes('pustaka')) resp='📖 Perpustakaan Digital tersedia di menu sidebar! AI akan merekomendasikan buku berdasarkan pola belajar dan materi yang sering Anda pelajari. Setiap buku yang dibaca otomatis tercatat ke aktivitas belajar!';

    typing.className='chat-msg ai p-3 text-sm'; typing.style.color='#b0b0c8'; typing.innerHTML=resp;
    chat.scrollTop=chat.scrollHeight;
  },

  async calendar(el){
    const acts=await FB.getActivities(App.user.uid);
    const now=new Date(); const yr=now.getFullYear(); const mo=now.getMonth();
    const fd=new Date(yr,mo,1).getDay(); const dim=new Date(yr,mo+1,0).getDate();
    const abd={};
    acts.forEach(a=>{const d=new Date(a.timestamp);if(d.getFullYear()===yr&&d.getMonth()===mo){const k=d.getDate();abd[k]=(abd[k]||0)+a.durasi;}});
    const mns=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    let cells='';
    for(let i=0;i<fd;i++) cells+='<div></div>';
    for(let d=1;d<=dim;d++){
      const m=abd[d]||0; const it=now.getDate()===d;
      const int=m===0?'':m<60?'bg-gold-400/15':m<120?'bg-gold-400/30':'bg-gold-400/55';
      cells+=`<div class="rounded-xl p-2 text-center transition-all hover:bg-white/5 ${int} ${it?'ring-1 ring-gold-400':''}"><p class="text-xs font-${it?'bold':'medium'} ${it?'text-gold-400':'text-[#9090b0]'}">${d}</p>${m>0?`<p class="text-[8px] text-[#60607a] mt-0.5">${Math.round(m/60*10)/10}j</p>`:''}</div>`;
    }
    el.innerHTML=`<div class="fu"><div class="mb-5"><h2 class="text-xl font-bold text-white">Kalender Belajar</h2></div>
      <div class="card p-5 mb-4">
        <div class="flex items-center justify-between mb-5"><h3 class="font-bold text-white text-lg">${mns[mo]} ${yr}</h3><div class="flex items-center gap-3 text-xs text-[#60607a]"><span class="flex items-center gap-1"><div class="w-3 h-3 rounded bg-gold-400/15"></div> <60m</span><span class="flex items-center gap-1"><div class="w-3 h-3 rounded bg-gold-400/30"></div> 60-120m</span><span class="flex items-center gap-1"><div class="w-3 h-3 rounded bg-gold-400/55"></div> >120m</span></div></div>

        <div class="grid grid-cols-7 gap-1.5">${cells}</div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        ${statCard('fa-calendar-check','Hari Aktif',Object.keys(abd).length+' hari','#10b981','rgba(16,185,129,.1)')}

        ${statCard('fa-chart-simple','Rata-rata/Hari',Object.keys(abd).length?Math.round(Object.values(abd).reduce((s,v)=>s+v,0)/Object.keys(abd).length)+'m':'-','#0ea5e9','rgba(14,165,233,.1)')}

  /* ACTIVITY MONITOR (Lecturer view - all students) */
  async actMonitor(el){
    const stus=await FB.getAllStudents();

      byUser[l.userId].total+=(l.duration||0);
    });

        <div class="card p-5"><h3 class="text-sm font-bold text-white mb-3">Waktu Belajar vs Game per Mahasiswa</h3><canvas id="l_act_cmp" height="230"></canvas></div>

          ${stus.map(s=>{
            const b=byUser[s.id]||{study:0,game:0,social:0,video:0,library:0,total:0};
            const pct=b.total>0?Math.round((b.study/b.total)*100):0;
            return `<tr onclick="LV.stuDetail('${s.id}')"><td><div class="flex items-center gap-2"><div class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold" style="background:rgba(255,255,255,.06);">${initials(s.name)}</div><span class="text-sm font-semibold text-white">${s.name}</span></div></td><td class="text-emerald-400 font-semibold">${Math.round(b.study/60*10)/10}j</td><td class="text-rose-400 font-semibold">${Math.round((b.game||0)/60*10)/10}j</td><td class="text-gold-400">${Math.round((b.social||0)/60*10)/10}j</td><td class="text-violet-400">${Math.round((b.video||0)/60*10)/10}j</td><td class="text-sky-400">${Math.round((b.library||0)/60*10)/10}j</td><td><div class="flex items-center gap-2"><div class="pbar w-16"><div class="pfill" style="width:${pct}%;background:${pct>=60?'#10b981':pct>=40?'#f59e0b':'#f43f5e'};"></div></div><span class="text-xs font-bold" style="color:${pct>=60?'#10b981':pct>=40?'#f59e0b':'#f43f5e'};">${pct}%</span></div></td></tr>`;

function switchAuthTab(t){
  const li=t==='login';
  document.getElementById('tLogin').classList.toggle('active',li);
  document.getElementById('tReg').classList.toggle('active',!li);
  document.getElementById('loginForm').classList.toggle('hidden',!li);
  document.getElementById('regForm').classList.toggle('hidden',li);
}
function fillDemo(r){
  document.getElementById('lEmail').value=r==='student'?'student@demo.com':'dosen@demo.com';
  document.getElementById('lPass').value='password123';
  switchAuthTab('login'); toast('Akun demo terisi. Klik Masuk!','info');
}
async function handleLogin(e){
  e.preventDefault(); const b=document.getElementById('lBtn');
  b.disabled=true; b.innerHTML='<span class="spinner"></span> Memproses...';
  try{await App.login(document.getElementById('lEmail').value,document.getElementById('lPass').value);}
  catch(err){toast(err.message,'error');}
  b.disabled=false; b.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard';
}
async function handleRegister(e){
  e.preventDefault(); const b=document.getElementById('rBtn');
  b.disabled=true; b.innerHTML='<span class="spinner"></span> Mendaftar...';
  try{await App.register(document.getElementById('rName').value,document.getElementById('rEmail').value,document.getElementById('rPass').value,document.getElementById('rRole').value);}
  catch(err){toast(err.message,'error');}
  b.disabled=false; b.innerHTML='<i class="fa-solid fa-user-plus"></i> Buat Akun';
}

/* INIT */
document.addEventListener('DOMContentLoaded',()=>App.init());
</script>
</body>
</html>
