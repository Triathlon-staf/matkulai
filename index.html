<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduPattern AI — Platform Belajar Cerdas</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Syne','sans-serif'],body:['Outfit','sans-serif']},colors:{gold:{300:'#fde68a',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309'},ink:{950:'#04040a',900:'#080810',800:'#0e0e1a',700:'#141424',600:'#1c1c2e',500:'#242438',400:'#2e2e48'}}}}};
</script>
<style>
:root{--gold:#f59e0b;--emerald:#10b981;--rose:#f43f5e;--violet:#8b5cf6;--sky:#0ea5e9;--orange:#f97316;}
*{scrollbar-width:thin;scrollbar-color:#2e2e48 transparent;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:#04040a;color:#e2e2f0;overflow-x:hidden;margin:0;}
h1,h2,h3,h4,h5,h6{font-family:'Syne',sans-serif;}
.mesh-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 600px 400px at 10% 20%,rgba(245,158,11,.055) 0%,transparent 60%),radial-gradient(ellipse 500px 500px at 90% 80%,rgba(139,92,246,.04) 0%,transparent 60%),radial-gradient(ellipse 400px 300px at 50% 50%,rgba(14,165,233,.025) 0%,transparent 70%);}
.grid-lines{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);background-size:60px 60px;}
.card{background:rgba(14,14,26,.75);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.055);border-radius:16px;transition:border-color .25s;}
.card:hover{border-color:rgba(245,158,11,.18);}
.card-static{background:rgba(14,14,26,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.055);border-radius:16px;}
.card-glow{box-shadow:0 0 40px rgba(245,158,11,.08);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:500;color:#9090b0;cursor:pointer;transition:all .2s;border:1px solid transparent;background:transparent;width:100%;text-align:left;}
.nav-item:hover{color:#e2e2f0;background:rgba(255,255,255,.04);}
.nav-item.active{color:#f59e0b;background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.2);}
.nav-item .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:rgba(255,255,255,.05);}
.nav-item.active .icon{background:rgba(245,158,11,.15);color:#f59e0b;}
.nav-section-title{font-size:10px;font-weight:700;letter-spacing:.12em;color:#50506a;text-transform:uppercase;padding:14px 14px 6px;}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a0e00;font-weight:700;font-family:'Syne',sans-serif;border:none;cursor:pointer;border-radius:10px;transition:all .2s;letter-spacing:.02em;}
.btn-gold:hover{box-shadow:0 0 24px rgba(245,158,11,.35);transform:translateY(-1px);}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#9090b0;border-radius:10px;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{background:rgba(255,255,255,.08);color:#e2e2f0;}
.btn-violet{background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;font-weight:700;font-family:'Syne',sans-serif;border:none;cursor:pointer;border-radius:10px;transition:all .2s;}
.btn-violet:hover{box-shadow:0 0 24px rgba(139,92,246,.35);transform:translateY(-1px);}
.input-field{background:rgba(8,8,16,.8);border:1px solid rgba(255,255,255,.08);color:#e2e2f0;border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Outfit',sans-serif;width:100%;transition:border-color .2s;}
.input-field:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.1);}
.input-field::placeholder{color:#50506a;}
select.input-field option{background:#0e0e1a;}
input[type="range"]{-webkit-appearance:none;background:transparent;border:none;width:100%;}
input[type="range"]::-webkit-slider-track{height:5px;background:#242438;border-radius:3px;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#f59e0b;cursor:pointer;margin-top:-6.5px;box-shadow:0 0 8px rgba(245,158,11,.5);}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.02em;}
.badge-green{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.2);}
.badge-red{background:rgba(244,63,94,.12);color:#f43f5e;border:1px solid rgba(244,63,94,.2);}
.badge-gold{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.2);}
.badge-violet{background:rgba(139,92,246,.12);color:#8b5cf6;border:1px solid rgba(139,92,246,.2);}
.badge-sky{background:rgba(14,165,233,.12);color:#0ea5e9;border:1px solid rgba(14,165,233,.2);}
.badge-orange{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.2);}
.progress-bar{height:6px;background:#1c1c2e;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width 1s ease;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:11px;font-weight:600;color:#50506a;text-transform:uppercase;letter-spacing:.08em;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.06);text-align:left;}
.data-table td{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13.5px;color:#b0b0c8;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr{cursor:pointer;transition:background .15s;}
.data-table tbody tr:hover{background:rgba(245,158,11,.03);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toast-in{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toast-out{to{transform:translateX(120%);opacity:0}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(245,158,11,.3)}70%{box-shadow:0 0 0 10px rgba(245,158,11,0)}100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}}
.fade-up{animation:fadeUp .4s ease-out both;}
.fade-in{animation:fadeIn .3s ease both;}
.stagger-1{animation-delay:.05s;}.stagger-2{animation-delay:.1s;}.stagger-3{animation-delay:.15s;}.stagger-4{animation-delay:.2s;}
.toast{animation:toast-in .35s cubic-bezier(.34,1.56,.64,1) both;}
.toast.out{animation:toast-out .3s ease forwards;}
.stat-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1;}
.stat-label{font-size:11px;color:#60607a;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:4px;}
.score-ring-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:10;}
.score-ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1);}
.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top-color:#f59e0b;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@media(max-width:768px){.sidebar{transform:translateX(-100%);position:fixed;z-index:60;}.sidebar.open{transform:translateX(0);}.main-area{margin-left:0!important;}}
.chat-msg{max-width:82%;}
.chat-msg.user{margin-left:auto;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.2);border-radius:14px 14px 4px 14px;}
.chat-msg.ai{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:14px 14px 14px 4px;}
.chat-scroll{height:340px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.pomo-ring{transform:rotate(-90deg);transform-origin:center;}
.pomo-track{fill:none;stroke:#1c1c2e;stroke-width:12;}
.pomo-fill{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
.goal-card{border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;background:rgba(8,8,16,.6);transition:all .2s;}
.goal-card:hover{border-color:rgba(245,158,11,.2);}
.goal-card.done{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.04);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#242438;border-radius:3px;}
.tab-strip{display:flex;gap:4px;background:rgba(8,8,16,.8);padding:4px;border-radius:12px;border:1px solid rgba(255,255,255,.06);}
.tab-btn{flex:1;padding:8px 12px;border-radius:9px;font-size:13px;font-weight:600;font-family:'Syne',sans-serif;border:none;cursor:pointer;transition:all .2s;color:#60607a;background:transparent;}
.tab-btn.active{background:rgba(245,158,11,.15);color:#f59e0b;}
.auth-orb{width:320px;height:320px;border-radius:50%;position:absolute;filter:blur(80px);pointer-events:none;}
.book-card{background:rgba(14,14,26,.75);border:1px solid rgba(255,255,255,.055);border-radius:16px;transition:all .25s;cursor:pointer;overflow:hidden;}
.book-card:hover{border-color:rgba(245,158,11,.3);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.book-spine{width:100%;height:6px;border-radius:3px 3px 0 0;}
.activity-bar{height:28px;border-radius:6px;transition:width .8s ease;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;}
.invite-code{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:.3em;color:#f59e0b;background:rgba(245,158,11,.08);border:2px dashed rgba(245,158,11,.3);border-radius:12px;padding:16px 24px;text-align:center;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);}
.modal{background:#0e0e1a;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;}
.notif-dot{width:7px;height:7px;background:#f43f5e;border-radius:50%;position:absolute;top:4px;right:4px;animation:pulse-ring 2s infinite;}
.lib-book{background:linear-gradient(135deg,var(--c1),var(--c2));border-radius:8px;padding:16px;color:white;font-family:'Syne',sans-serif;position:relative;overflow:hidden;cursor:pointer;transition:all .25s;}
.lib-book:hover{transform:scale(1.03);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.lib-book::after{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:rgba(255,255,255,.05);}
.risk-banner{background:linear-gradient(135deg,rgba(244,63,94,.12),rgba(244,63,94,.04));border:1px solid rgba(244,63,94,.25);border-radius:12px;padding:14px 18px;}
/* Calendar holiday */
.cal-holiday{background:rgba(244,63,94,.15)!important;border:1px solid rgba(244,63,94,.3)!important;}
.cal-holiday .day-num{color:#f43f5e!important;font-weight:700!important;}
/* iPusnas badge */
.ipusnas-badge{background:linear-gradient(135deg,#e53e3e,#c53030);color:white;font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.05em;}
</style>
</head>
<body>
<div class="mesh-bg"></div>
<div class="grid-lines"></div>
<div id="toastContainer" class="fixed top-4 right-4 z-[500] flex flex-col gap-2" style="min-width:0;max-width:340px;"></div>
<div id="modalContainer"></div>

<!-- AUTH PAGE -->
<div id="authPage" class="relative z-10 min-h-screen flex items-center justify-center p-4">
  <div class="auth-orb" style="background:rgba(245,158,11,.07);top:-100px;left:-120px;"></div>
  <div class="auth-orb" style="background:rgba(139,92,246,.05);bottom:-80px;right:-100px;width:260px;height:260px;"></div>
  <div class="w-full max-w-[420px] relative z-10">
    <div class="text-center mb-8 fade-up">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.05));border:1px solid rgba(245,158,11,.25);">
        <i class="fa-solid fa-brain text-2xl text-gold-400"></i>
      </div>
      <h1 class="text-4xl font-bold text-white">EduPattern <span class="text-gold-400">AI</span></h1>
      <p class="text-sm text-[#60607a] mt-2 font-medium">Platform Analisis Pola Belajar Cerdas</p>
    </div>
    <div class="card card-glow p-6 fade-up stagger-1">
      <div class="tab-strip mb-6" id="authTabs">
        <button onclick="switchAuthTab('login')" class="tab-btn active" id="tabLogin">Masuk</button>
        <button onclick="switchAuthTab('register')" class="tab-btn" id="tabRegister">Daftar</button>
      </div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Email</label>
            <input type="email" id="loginEmail" required class="input-field" placeholder="email@contoh.com"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Password</label>
            <div class="relative">
              <input type="password" id="loginPass" required class="input-field pr-10" placeholder="••••••••"/>
              <button type="button" onclick="togglePassword('loginPass',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#50506a] hover:text-[#9090b0] text-sm"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <button type="submit" id="loginBtn" class="btn-gold w-full py-3 text-sm mt-2 flex items-center justify-center gap-2">
            <i class="fa-solid fa-right-to-bracket"></i> Masuk ke Dashboard
          </button>
        </div>
      </form>
      <form id="registerForm" onsubmit="handleRegister(event)" class="hidden">
        <div class="space-y-4">
          <div><label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Nama Lengkap</label><input type="text" id="regName" required class="input-field" placeholder="Nama lengkap Anda"/></div>
          <div><label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Email</label><input type="email" id="regEmail" required class="input-field" placeholder="email@contoh.com"/></div>
          <div>
            <label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Password</label>
            <div class="relative">
              <input type="password" id="regPass" required minlength="6" class="input-field pr-10" placeholder="Min. 6 karakter"/>
              <button type="button" onclick="togglePassword('regPass',this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#50506a] hover:text-[#9090b0] text-sm"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div><label class="block text-xs font-semibold text-[#70709a] mb-1.5 uppercase tracking-wider">Peran</label>
            <select id="regRole" required class="input-field">
              <option value="student">👨‍🎓 Mahasiswa</option>
              <option value="lecturer">👨‍🏫 Dosen</option>
            </select>
          </div>
          <button type="submit" id="regBtn" class="btn-gold w-full py-3 text-sm mt-2 flex items-center justify-center gap-2">
            <i class="fa-solid fa-user-plus"></i> Buat Akun
          </button>
        </div>
      </form>
    </div>
    <div class="card p-4 mt-3 fade-up stagger-2">
      <p class="text-xs text-[#50506a] mb-3 flex items-center gap-2"><i class="fa-solid fa-flask-vial text-gold-400"></i><span class="font-semibold">Akun Demo — klik untuk isi otomatis</span></p>
      <div class="flex gap-2">
        <button onclick="fillDemo('student')" class="btn-ghost flex-1 py-2 text-xs flex items-center justify-center gap-2"><i class="fa-solid fa-graduation-cap text-gold-400"></i> Mahasiswa</button>
        <button onclick="fillDemo('lecturer')" class="btn-ghost flex-1 py-2 text-xs flex items-center justify-center gap-2"><i class="fa-solid fa-chalkboard-user text-violet-400"></i> Dosen</button>
      </div>
    </div>
  </div>
</div>

<!-- STUDENT DASHBOARD -->
<div id="studentDash" class="relative z-10 hidden">
  <div class="md:hidden fixed top-0 inset-x-0 z-50 card-static px-4 py-3 flex items-center justify-between" style="border-radius:0;border-left:0;border-right:0;border-top:0;">
    <button onclick="toggleSidebar('sidebar','sOverlay')" class="text-[#70709a] hover:text-gold-400 transition-colors"><i class="fa-solid fa-bars text-lg"></i></button>
    <span class="font-display font-bold text-sm text-white">EduPattern <span class="text-gold-400">AI</span></span>
    <button onclick="App.logout()" class="text-[#70709a] hover:text-rose-400 transition-colors"><i class="fa-solid fa-right-from-bracket"></i></button>
  </div>
  <aside id="sidebar" class="sidebar fixed left-0 top-0 bottom-0 w-[220px] card-static flex flex-col z-50 transition-transform duration-300" style="border-radius:0;border-top:0;border-bottom:0;border-left:0;">
    <div class="p-5 border-b border-white/5">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.06));border:1px solid rgba(245,158,11,.2);"><i class="fa-solid fa-brain text-gold-400 text-sm"></i></div>
        <div><h2 class="font-display font-bold text-sm text-white">EduPattern</h2><p class="text-[10px] text-[#50506a] font-semibold uppercase tracking-wider">Student</p></div>
      </div>
    </div>
    <nav class="flex-1 py-3 px-3 space-y-0.5 overflow-y-auto">
      <p class="nav-section-title">Menu</p>
      <button onclick="StudentView.showTab('overview')" data-tab="overview" class="nav-item active"><span class="icon"><i class="fa-solid fa-house-chimney"></i></span> Beranda</button>
      <button onclick="StudentView.showTab('classes')" data-tab="classes" class="nav-item"><span class="icon"><i class="fa-solid fa-school"></i></span> Kelas Saya</button>
      <button onclick="StudentView.showTab('input')" data-tab="input" class="nav-item"><span class="icon"><i class="fa-solid fa-pen-to-square"></i></span> Input Aktivitas</button>
      <button onclick="StudentView.showTab('patterns')" data-tab="patterns" class="nav-item"><span class="icon"><i class="fa-solid fa-chart-line"></i></span> Pola Belajar</button>
      <button onclick="StudentView.showTab('recommendations')" data-tab="recommendations" class="nav-item"><span class="icon"><i class="fa-solid fa-lightbulb"></i></span> Rekomendasi</button>
      <p class="nav-section-title">Tools</p>
      <button onclick="StudentView.showTab('library')" data-tab="library" class="nav-item"><span class="icon"><i class="fa-solid fa-book-open"></i></span> Perpustakaan</button>
      <button onclick="StudentView.showTab('activity_monitor')" data-tab="activity_monitor" class="nav-item"><span class="icon"><i class="fa-solid fa-gamepad"></i></span> Monitor Aktivitas</button>
      <button onclick="StudentView.showTab('pomodoro')" data-tab="pomodoro" class="nav-item"><span class="icon"><i class="fa-solid fa-clock-rotate-left"></i></span> Timer Pomodoro</button>
      <button onclick="StudentView.showTab('goals')" data-tab="goals" class="nav-item"><span class="icon"><i class="fa-solid fa-bullseye"></i></span> Target Belajar</button>
      <button onclick="StudentView.showTab('chat')" data-tab="chat" class="nav-item"><span class="icon"><i class="fa-solid fa-robot"></i></span> AI Tutor</button>
      <button onclick="StudentView.showTab('calendar')" data-tab="calendar" class="nav-item"><span class="icon"><i class="fa-solid fa-calendar-days"></i></span> Kalender</button>
    </nav>
    <div class="p-4 border-t border-white/5">
      <div class="flex items-center gap-3 mb-3">
        <div id="studentAvatar" class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a0e00;">?</div>
        <div class="flex-1 min-w-0"><p id="studentName" class="text-xs font-semibold text-white truncate">Pengguna</p><p class="text-[10px] text-[#50506a]">Mahasiswa</p></div>
      </div>
      <button onclick="App.logout()" class="btn-ghost w-full py-2 text-xs flex items-center justify-center gap-2 hover:!text-rose-400"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>
  </aside>
  <div id="sOverlay" onclick="toggleSidebar('sidebar','sOverlay')" class="hidden fixed inset-0 bg-black/60 z-40 md:hidden"></div>
  <main class="main-area min-h-screen pb-8 px-5 pt-5" style="margin-left:220px;">
    <div class="md:hidden h-12 mb-2"></div>
    <div id="studentContent" class="max-w-5xl mx-auto"></div>
  </main>
</div>

<!-- LECTURER DASHBOARD -->
<div id="lecturerDash" class="relative z-10 hidden">
  <div class="md:hidden fixed top-0 inset-x-0 z-50 card-static px-4 py-3 flex items-center justify-between" style="border-radius:0;border-left:0;border-right:0;border-top:0;">

/* ================================================================
   CLOUD FUNCTIONS
================================================================ */
const CloudFn = {
  onActivityCreated(act) {
    const uid=act.userId;
    const all=DB.aktivitas.filter(a=>a.userId===uid);
    const analysis=AIEngine.analyzePatterns(all);
    DB.analisis[uid]={polaBelajar:analysis,rekomendasi:AIEngine.generateRecommendations(analysis),updatedAt:new Date().toISOString()};
    (DB.goals[uid]||[]).forEach(g=>{
      if(g.linkedMateri===act.materi && !g.done){
        if(g.unit==='menit') { g.current=Math.min(g.target, g.current+act.durasi); if(g.current>=g.target) g.done=true; }
        else if(g.unit==='sesi') { g.current=Math.min(g.target, g.current+1); if(g.current>=g.target) g.done=true; }
      }
    });
  },
  onBookProgressUpdate(uid,bookId) {
    const uid_acts=DB.aktivitas.filter(a=>a.userId===uid);
    const analysis=AIEngine.analyzePatterns(uid_acts);
    DB.analisis[uid]={polaBelajar:analysis,rekomendasi:AIEngine.generateRecommendations(analysis),updatedAt:new Date().toISOString()};
  }
};

/* ================================================================
   ACTIVITY MONITOR
================================================================ */
const ActivityMonitor = {
  logActivity(uid, type, app, duration, category, detail='') {
    if (!DB.activityMonitor[uid]) DB.activityMonitor[uid]=[];
    DB.activityMonitor[uid].push({type,app,duration,category,detail,timestamp:new Date().toISOString()});
  },
  getStats(uid) {
    const acts = DB.activityMonitor[uid]||[];
    const byCategory={};
    acts.forEach(a=>{ byCategory[a.category]=(byCategory[a.category]||0)+a.duration; });
    const byApp={};
    acts.forEach(a=>{ byApp[a.app]=(byApp[a.app]||0)+a.duration; });
    const total=acts.reduce((s,a)=>s+a.duration,0);
    return {acts, byCategory, byApp, total};
  }
};

/* ================================================================
   AI ENGINE
================================================================ */
const AIEngine = {
  analyzePatterns(activities) {
    if (!activities.length) return this.emptyAnalysis();
    const now=new Date(); const weekMs=7*86400000;
    const timeSlots={pagi:0,siang:0,sore:0,malam:0,larut:0};
    let totalDurasi=0; const durations=[]; const materiCount={}; const dailyHours={};
    activities.forEach(a=>{
      const d=new Date(a.timestamp); const h=d.getHours();
      totalDurasi+=a.durasi; durations.push(a.durasi);
      materiCount[a.materi]=(materiCount[a.materi]||0)+1;
      const dk=d.toISOString().slice(0,10); dailyHours[dk]=(dailyHours[dk]||0)+a.durasi;
      if(h>=6&&h<12) timeSlots.pagi++; else if(h>=12&&h<15) timeSlots.siang++; else if(h>=15&&h<18) timeSlots.sore++; else if(h>=18&&h<22) timeSlots.malam++; else timeSlots.larut++;
    });
    const maxSlot=Object.entries(timeSlots).sort((a,b)=>b[1]-a[1])[0];
    const typeMap={pagi:'Pagi Hari (06-12)',siang:'Siang Hari (12-15)',sore:'Sore Hari (15-18)',malam:'Malam Hari (18-22)',larut:'Larut Malam (22-06)'};
    const tipeBelajar=typeMap[maxSlot[0]];
    const avgDurasi=totalDurasi/activities.length;
    const stdDurasi=Math.sqrt(durations.reduce((s,d)=>s+Math.pow(d-avgDurasi,2),0)/durations.length);
    const dayValues=Object.values(dailyHours); const avgPerDay=dayValues.reduce((s,v)=>s+v,0)/dayValues.length;
    const stdDay=Math.sqrt(dayValues.reduce((s,v)=>s+Math.pow(v-avgPerDay,2),0)/dayValues.length);
    const consistencyScore=Math.max(0,Math.min(100,Math.round(100-(stdDay/Math.max(1,avgPerDay))*100)));
    const konsistensi=consistencyScore>=70?'Konsisten':consistencyScore>=40?'Cukup Konsisten':'Tidak Konsisten';
    const totalSessions=activities.length; const activeDays=Object.keys(dailyHours).length;
    const daysSpan=Math.max(1,Math.ceil((now-new Date(activities[activities.length-1].timestamp))/86400000));
    const freqPerWeek=Math.round((totalSessions/daysSpan)*7*10)/10;
    const topMateri=Object.entries(materiCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const week1=activities.filter(a=>now-new Date(a.timestamp)<weekMs);
    const week2=activities.filter(a=>{const d=now-new Date(a.timestamp);return d>=weekMs&&d<2*weekMs;});
    const avgW1=week1.length?week1.reduce((s,a)=>s+a.durasi,0)/week1.length:0;
    const avgW2=week2.length?week2.reduce((s,a)=>s+a.durasi,0)/week2.length:0;
    const trendPct=avgW2>0?Math.round(((avgW1-avgW2)/avgW2)*100):week1.length>0?50:0;
    const tren=trendPct>10?'Meningkat':trendPct<-10?'Menurun':'Stabil';
    const skor=Math.round(consistencyScore*0.35+Math.min(100,(avgDurasi/90)*100)*0.3+Math.min(100,(freqPerWeek/7)*100)*0.2+(trendPct>0?20:trendPct>-10?10:0));
    const dayOfWeekDist=[0,0,0,0,0,0,0]; const dayOfWeekMinutes=[0,0,0,0,0,0,0];
    activities.forEach(a=>{const dow=new Date(a.timestamp).getDay();dayOfWeekDist[dow]++;dayOfWeekMinutes[dow]+=a.durasi;});
    const weeklyData=[];
    for(let w=3;w>=0;w--){const wActs=activities.filter(a=>{const d=now-new Date(a.timestamp);return d>=w*weekMs&&d<(w+1)*weekMs;});weeklyData.push({week:`-${w+1}W`,total:wActs.reduce((s,a)=>s+a.durasi,0),count:wActs.length});}
    return {totalSessions,totalDurasi,totalJam:(totalDurasi/60).toFixed(1),avgDurasi:Math.round(avgDurasi),minDurasi:Math.min(...durations),maxDurasi:Math.max(...durations),stdDurasi:Math.round(stdDurasi),kategoriDurasi:avgDurasi<30?'Kurang Fokus':avgDurasi<60?'Sedang':avgDurasi<120?'Fokus':'Intensif',tipeBelajar,konsistensi,consistencyScore,activeDays,daysSpan,freqPerWeek,topMateri,tren,trendPct,skor,timeSlots,dayOfWeekDist,dayOfWeekMinutes,weeklyData,materiCount};
  },
  emptyAnalysis() {
    return {totalSessions:0,totalDurasi:0,totalJam:'0',avgDurasi:0,minDurasi:0,maxDurasi:0,stdDurasi:0,skor:0,tren:'Belum ada data',trendPct:0,konsistensi:'-',consistencyScore:0,tipeBelajar:'-',kategoriDurasi:'-',topMateri:[],timeSlots:{pagi:0,siang:0,sore:0,malam:0,larut:0},dayOfWeekDist:[0,0,0,0,0,0,0],dayOfWeekMinutes:[0,0,0,0,0,0,0],weeklyData:[],materiCount:{}};
  },
  generateRecommendations(analysis) {
    if (!analysis.totalSessions) return [{icon:'fa-circle-info',color:'text-sky-400',bg:'rgba(14,165,233,.1)',title:'Mulai Catat Aktivitas',desc:'Belum ada data belajar. Mulai input aktivitas untuk mendapatkan rekomendasi AI personal.'}];
    const recs=[];
    if(analysis.avgDurasi<30) recs.push({icon:'fa-clock',color:'text-gold-400',bg:'rgba(245,158,11,.1)',title:'Tingkatkan Durasi Belajar',desc:`Rata-rata ${analysis.avgDurasi} menit/sesi terlalu singkat. Target 45–60 menit/sesi optimal.`});
    else if(analysis.avgDurasi>120) recs.push({icon:'fa-hourglass-half',color:'text-orange-400',bg:'rgba(249,115,22,.1)',title:'Hindari Sesi Terlalu Panjang',desc:`${analysis.avgDurasi} menit/sesi bisa sebabkan kelelahan kognitif. Bagi menjadi blok 45–60 menit.`});
    else recs.push({icon:'fa-circle-check',color:'text-emerald-400',bg:'rgba(16,185,129,.1)',title:'Durasi Belajar Optimal',desc:`Rata-rata ${analysis.avgDurasi} menit/sesi sangat baik. Pertahankan!`});
    if(analysis.consistencyScore<40) recs.push({icon:'fa-calendar-xmark',color:'text-rose-400',bg:'rgba(244,63,94,.1)',title:'Perkuat Konsistensi',desc:'Pola belajar sangat tidak menentu. Buat jadwal tetap dan gunakan Target Belajar untuk tracking.'});
    if(analysis.tipeBelajar&&analysis.tipeBelajar.includes('Larut')) recs.push({icon:'fa-moon',color:'text-violet-400',bg:'rgba(139,92,246,.1)',title:'Perhatikan Pola Tidur',desc:'Belajar >22:00 mengganggu konsolidasi memori. Geser ke pagi/sore untuk hasil optimal.'});
    if(analysis.freqPerWeek<4) recs.push({icon:'fa-repeat',color:'text-sky-400',bg:'rgba(14,165,233,.1)',title:'Perbanyak Frekuensi',desc:`${analysis.freqPerWeek}x/minggu terlalu jarang. Target minimal 5–6 sesi/minggu.`});
    if(analysis.tren==='Menurun') recs.push({icon:'fa-arrow-trend-down',color:'text-rose-400',bg:'rgba(244,63,94,.1)',title:'Tren Menurun!',desc:`Aktivitas turun ${Math.abs(analysis.trendPct)}% vs minggu lalu. Identifikasi hambatan dan minta dukungan.`});
    else if(analysis.tren==='Meningkat') recs.push({icon:'fa-arrow-trend-up',color:'text-emerald-400',bg:'rgba(16,185,129,.1)',title:'Momentum Positif!',desc:`Aktivitas naik ${analysis.trendPct}% minggu ini. Tetapkan target lebih menantang!`});
    if(analysis.topMateri.length>=2) recs.push({icon:'fa-book-open',color:'text-violet-400',bg:'rgba(139,92,246,.1)',title:'Seimbangkan Materi',desc:`Fokus terbanyak di "${analysis.topMateri[0][0]}". Pastikan semua mata kuliah mendapat perhatian proporsional.`});
    return recs;
  },
  isAtRisk(a) {
    if(!a||a.totalSessions===0) return true;
    let r=0;
    if(a.freqPerWeek<3) r+=3; else if(a.freqPerWeek<5) r+=1;
    if(a.avgDurasi<25) r+=3; else if(a.avgDurasi<40) r+=1;
    if(a.consistencyScore<30) r+=3; else if(a.consistencyScore<50) r+=1;
    if(a.tren==='Menurun') r+=2;
    if(a.skor<30) r+=2; else if(a.skor<50) r+=1;
    return r>=5;
  },
  getRiskLevel(a) {
    if(!a||a.totalSessions===0) return 'high';
    let r=0;
    if(a.freqPerWeek<3) r+=3; else if(a.freqPerWeek<5) r+=1;
    if(a.avgDurasi<25) r+=3; else if(a.avgDurasi<40) r+=1;
    if(a.consistencyScore<30) r+=3; else if(a.consistencyScore<50) r+=1;
    if(a.tren==='Menurun') r+=2;
    if(a.skor<30) r+=2; else if(a.skor<50) r+=1;
    if(r>=7) return 'high'; if(r>=4) return 'medium'; return 'low';
  }
};

function toast(msg,type='success',dur=3500){
  const el=document.createElement('div');
  const cfg={success:{bg:'rgba(16,185,129,.12)',border:'rgba(16,185,129,.25)',icon:'fa-check-circle text-emerald-400'},error:{bg:'rgba(244,63,94,.12)',border:'rgba(244,63,94,.25)',icon:'fa-times-circle text-rose-400'},info:{bg:'rgba(14,165,233,.12)',border:'rgba(14,165,233,.25)',icon:'fa-info-circle text-sky-400'},warn:{bg:'rgba(245,158,11,.12)',border:'rgba(245,158,11,.25)',icon:'fa-exclamation-triangle text-gold-400'}};
  const c=cfg[type]||cfg.success;
  el.className='toast flex items-center gap-3 px-4 py-3 rounded-2xl text-sm text-gray-200';
  el.style.cssText=`background:${c.bg};border:1px solid ${c.border};backdrop-filter:blur(20px);`;
  el.innerHTML=`<i class="fa-solid ${c.icon} text-base flex-shrink-0"></i><span style="font-family:'Outfit',sans-serif;">${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300);},dur);
}

function scoreRing(score){
  const r=44;const circ=2*Math.PI*r;const offset=circ*(1-score/100);const c=scoreColor(score);
  return `<svg viewBox="0 0 100 100" width="100" height="100"><circle class="score-ring-track" cx="50" cy="50" r="${r}"/><circle class="score-ring-fill" cx="50" cy="50" r="${r}" stroke="${c}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 50 50)"/><text x="50" y="47" text-anchor="middle" font-family="Syne" font-size="18" font-weight="800" fill="white">${score}</text><text x="50" y="60" text-anchor="middle" font-family="Outfit" font-size="9" fill="#60607a">/ 100</text></svg>`;
}

================================================================ */
const Pomodoro={
  timer:null,timeLeft:25*60,mode:'focus',running:false,
  focusMin:25,breakMin:5,longBreakMin:15,sessionCount:0,onTick:null,
  start(){if(this.running)return;this.running=true;this.timer=setInterval(()=>{this.timeLeft--;if(this.onTick)this.onTick();if(this.timeLeft<=0)this.complete();},1000);},
  pause(){clearInterval(this.timer);this.running=false;if(this.onTick)this.onTick();},
  stop(){clearInterval(this.timer);this.running=false;this.timeLeft=this.focusMin*60;this.mode='focus';if(this.onTick)this.onTick();},
  setMode(m){this.pause();this.mode=m;this.timeLeft=(m==='focus'?this.focusMin:m==='break'?this.breakMin:this.longBreakMin)*60;if(this.onTick)this.onTick();},
  complete(){clearInterval(this.timer);this.running=false;toast(this.mode==='focus'?'🎉 Sesi fokus selesai!':'☕ Istirahat selesai.','info');if(this.mode==='focus'){this.sessionCount++;this.mode=this.sessionCount%4===0?'longbreak':'break';this.timeLeft=(this.mode==='break'?this.breakMin:this.longBreakMin)*60;}else{this.mode='focus';this.timeLeft=this.focusMin*60;}if(this.onTick)this.onTick();},
  format(){const m=Math.floor(this.timeLeft/60);const s=this.timeLeft%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;},
  progress(){const total=(this.mode==='focus'?this.focusMin:this.mode==='break'?this.breakMin:this.longBreakMin)*60;return 1-this.timeLeft/total;}
};

  async saveBookProgress(bookId){
    const pages=parseInt(document.getElementById('bookPages').value)||0;
    const notes=document.getElementById('bookNotes').value;
    const goalLinked=document.getElementById('bookGoal').value||null;
    const book=IPUSNAS_BOOKS.find(b=>b.id===bookId);
    if(pages<0||pages>book.pages){toast('Halaman tidak valid','error');return;}
    const oldProg=DB.bookProgress[App.currentUser.uid+'_'+bookId]||{pagesRead:0};
    const newPages=pages-oldProg.pagesRead;
    await FireStore.updateBookProgress(App.currentUser.uid,bookId,{pagesRead:pages,notes,goalLinked,lastRead:new Date().toISOString()});
    if(newPages>0){
      const readingMins=Math.round((newPages/book.pages)*book.estimatedMinutes);
      ActivityMonitor.logActivity(App.currentUser.uid,'study','Membaca',readingMins,'Akademik',book.title);
    }
    if(goalLinked){
      const goals=await FireStore.getGoals(App.currentUser.uid);
      const goal=goals.find(g=>g.id===goalLinked);
      if(goal&&goal.unit==='halaman'){
        goal.current=Math.min(goal.target,pages);
        if(goal.current>=goal.target) goal.done=true;
        await FireStore.saveGoal(App.currentUser.uid,goal);
      }
    }
    toast(`Progress buku "${book.title.slice(0,30)}..." tersimpan! 📚`);
    closeModal();
    await this.renderLibrary(document.getElementById('studentContent'));
  },

          </div>

      <div class="grid lg:grid-cols-2 gap-4 mb-4">
        <div class="card p-5"><h3 class="text-sm font-bold text-white mb-4">Distribusi Aktivitas</h3>

  renderPomodoro(el){

      timeEl.textContent=Pomodoro.format();
      const r=80;const circ=2*Math.PI*r;
      fillEl.setAttribute('stroke-dasharray',circ);
      fillEl.setAttribute('stroke-dashoffset',circ*(1-Pomodoro.progress()));
      btnEl.innerHTML=Pomodoro.running?'<i class="fa-solid fa-pause mr-2"></i>Jeda':'<i class="fa-solid fa-play mr-2"></i>Mulai';
      const modeEl=document.getElementById('pomo_mode');
      if(modeEl) modeEl.textContent=Pomodoro.mode==='focus'?'🎯 Fokus':Pomodoro.mode==='break'?'☕ Istirahat':'🛌 Istirahat Panjang';
      const sessEl=document.getElementById('pomo_sessions');
      if(sessEl) sessEl.textContent=Pomodoro.sessionCount;
    };
    Pomodoro.onTick=updateUI;
    const r=80;const circ=2*Math.PI*r;
    el.innerHTML=`<div class="fade-up">
      <div class="mb-6"><h2 class="text-xl font-bold text-white">Timer Pomodoro</h2><p class="text-sm text-[#60607a] mt-1">Tingkatkan fokus dengan teknik Pomodoro</p></div>

            <svg width="200" height="200" viewBox="0 0 200 200" class="pomo-ring">
              <circle class="pomo-track" cx="100" cy="100" r="${r}"/>

            </svg>
            <div class="absolute inset-0 flex items-center justify-center">

            <button onclick="Pomodoro.setMode('break')" class="btn-ghost px-4 py-2 text-xs">☕ Istirahat</button>
            <button onclick="Pomodoro.setMode('longbreak')" class="btn-ghost px-4 py-2 text-xs">🛌 Panjang</button>

  renderGoalCards(goals){
    if(!goals.length) return '';
    return goals.map(g=>{
      const pct=Math.min(100,Math.round((g.current/g.target)*100));
      const done=g.done||g.current>=g.target;
      return `<div class="goal-card ${done?'done':''}">

  async saveGoal(e){
    e.preventDefault();
    const goal={id:'g_'+Date.now(),title:document.getElementById('goalTitle').value,target:parseInt(document.getElementById('goalTarget').value),current:0,unit:document.getElementById('goalUnit').value,deadline:document.getElementById('goalDeadline').value,done:false,linkedMateri:document.getElementById('goalMateri').value||null};
    await FireStore.saveGoal(App.currentUser.uid,goal);
    toast('Target belajar berhasil ditambahkan!');
    await this.renderGoals(document.getElementById('studentContent'));
  },

  async incrementGoal(goalId){
    const goals=await FireStore.getGoals(App.currentUser.uid);
    const goal=goals.find(g=>g.id===goalId);
    if(!goal)return;
    const inc=parseInt(prompt(`Progress saat ini: ${goal.current}/${goal.target} ${goal.unit}\nMasukkan jumlah penambahan:`)||'0');
    if(!inc||isNaN(inc))return;
    goal.current=Math.min(goal.target,goal.current+inc);
    if(goal.current>=goal.target){goal.done=true;toast('🎉 Target tercapai! Luar biasa!');}
    else toast(`Progress: ${goal.current}/${goal.target} ${goal.unit}`);
    await FireStore.saveGoal(App.currentUser.uid,goal);
    await this.renderGoals(document.getElementById('studentContent'));
  },

  async deleteGoal(goalId){
    if(!confirm('Hapus target ini?'))return;
    await FireStore.deleteGoal(App.currentUser.uid,goalId);
    toast('Target dihapus','info');
    await this.renderGoals(document.getElementById('studentContent'));
  },

  getAIResponse(msg,a){

    if(msg.includes('rekomendasi buku')) return `📚 Berdasarkan materi Anda, buku rekomendasi dari iPusnas: <strong>${a.topMateri[0]?.[0]?'buku '+a.topMateri[0][0]:'buku Algoritma dan Pemrograman'}</strong>. Buka menu <strong>Perpustakaan</strong> dan klik "Baca di iPusnas" untuk langsung mengakses. Semua buku tersedia gratis!`;

  async renderCalendar(el){
    const acts=await FireStore.getActivities(App.currentUser.uid);
    const now=new Date();
    const year=now.getFullYear();const month=now.getMonth();
    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();
    const actByDay={};
    acts.forEach(a=>{const d=new Date(a.timestamp);if(d.getFullYear()===year&&d.getMonth()===month){const k=d.getDate();actByDay[k]=(actByDay[k]||0)+a.durasi;}});
    const monthNames=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    const dayNames=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    // Get holidays for this month
    const monthHolidays={};
    Object.entries(NATIONAL_HOLIDAYS_2026).forEach(([dateStr,name])=>{
      const d=new Date(dateStr);
      if(d.getFullYear()===year&&d.getMonth()===month){
        monthHolidays[d.getDate()]=name;
      }
    });
    let calCells='';
    for(let i=0;i<firstDay;i++) calCells+='<div></div>';
    for(let d=1;d<=daysInMonth;d++){
      const mins=actByDay[d]||0;const isToday=d===now.getDate();
      const holiday=monthHolidays[d];
      const intensity=mins===0?'':mins<60?'bg-gold-400/15':mins<120?'bg-gold-400/30':'bg-gold-400/55';
      const holidayClass=holiday?'cal-holiday':'';
      calCells+=`<div class="rounded-xl p-2 text-center transition-all cursor-pointer hover:bg-white/5 ${intensity} ${holidayClass} ${isToday?'ring-1 ring-gold-400':''}" title="${holiday||''}" onclick="${holiday?`alert('Hari Libur: '+\`${holiday}\`)`:''}">
        <p class="day-num text-xs font-${isToday?'bold':'medium'} ${isToday?'text-gold-400':holiday?'text-red-400':'text-[#9090b0]'}">${d}</p>
        ${mins>0?`<p class="text-[9px] text-[#60607a] mt-0.5">${Math.round(mins/60*10)/10}j</p>`:''}
        ${holiday?`<p class="text-[7px] text-red-400 mt-0.5 leading-tight" style="display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;">${holiday.split('(')[0].trim().split(' ').slice(0,2).join(' ')}</p>`:''}
      </div>`;
    }
    // Count holidays in this month
    const holidayCount=Object.keys(monthHolidays).length;
    el.innerHTML=`<div class="fade-up">
      <div class="mb-6"><h2 class="text-xl font-bold text-white">Kalender Belajar</h2><p class="text-sm text-[#60607a] mt-1">Aktivitas belajar + hari libur nasional 2026</p></div>
      <div class="card p-6 mb-4">
        <div class="flex items-center justify-between mb-6">
          <h3 class="font-bold text-white text-lg">${monthNames[month]} ${year}</h3>
          <div class="flex items-center gap-3 text-xs text-[#60607a] flex-wrap justify-end">
            <span class="flex items-center gap-1.5"><div class="w-3 h-3 rounded bg-gold-400/30"></div>Belajar</span>
            <span class="flex items-center gap-1.5"><div class="w-3 h-3 rounded" style="background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);"></div>Libur Nasional</span>
            <span class="flex items-center gap-1.5"><div class="w-3 h-3 rounded ring-1 ring-gold-400"></div>Hari ini</span>
          </div>
        </div>
        <div class="grid grid-cols-7 gap-2 mb-2">${dayNames.map(d=>`<div class="text-center text-[11px] font-bold text-[#50506a] py-1">${d}</div>`).join('')}</div>
        <div class="grid grid-cols-7 gap-2">${calCells}</div>
      </div>
      <!-- Holiday list this month -->
      ${holidayCount>0?`<div class="card p-5 mb-4">
        <h3 class="text-sm font-bold text-white mb-3 flex items-center gap-2"><i class="fa-solid fa-calendar-day text-red-400 text-xs"></i> Hari Libur Nasional — ${monthNames[month]} ${year}</h3>
        <div class="space-y-2">
          ${Object.entries(monthHolidays).sort((a,b)=>a[0]-b[0]).map(([day,name])=>`<div class="flex items-center gap-3 py-2 border-b border-white/5 last:border-0">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-xs font-bold" style="background:rgba(244,63,94,.1);color:#f43f5e;">${day}</div>
            <p class="text-xs font-semibold text-white">${name}</p>
          </div>`).join('')}
        </div>
      </div>`:''}
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div class="card p-4 text-center"><p class="stat-label">Hari Aktif</p><p class="stat-num text-gold-400 mt-2">${Object.keys(actByDay).length}</p></div>
        <div class="card p-4 text-center"><p class="stat-label">Total Menit</p><p class="stat-num text-emerald-400 mt-2">${Object.values(actByDay).reduce((s,v)=>s+v,0)}</p></div>
        <div class="card p-4 text-center"><p class="stat-label">Libur Bulan Ini</p><p class="stat-num text-red-400 mt-2">${holidayCount}</p></div>
        <div class="card p-4 text-center"><p class="stat-label">Rata-rata/Hari</p><p class="stat-num text-sky-400 mt-2 text-xl">${Object.keys(actByDay).length?Math.round(Object.values(actByDay).reduce((s,v)=>s+v,0)/Object.keys(actByDay).length):0}m</p></div>
      </div>
    </div>`;
  }
};

    destroyCharts('lect_');
    el.innerHTML=`<div class="fade-up">
      <button onclick="LecturerView.showTab('classes')" class="flex items-center gap-2 text-sm text-[#70709a] hover:text-violet-400 mb-5 transition-colors"><i class="fa-solid fa-arrow-left"></i> Kembali</button>

          <div class="overflow-y-auto" style="max-height:220px;">
            ${stats.map(m=>`<div class="flex items-center gap-3 py-2.5 border-b border-white/5 last:border-0 cursor-pointer" onclick="LecturerView.showStudentDetail('${m.id}')">

        const gameMins=actStats.byCategory['Game']||0;
        const studyMins=actStats.byCategory['Akademik']||0;

        if(a.consistencyScore<30) problems.push('Tidak konsisten');

          <div class="flex items-center gap-4 mb-3">

  // ================================================================
  // READING HABITS — Fitur baru: kebiasaan bahan bacaan mahasiswa
  // ================================================================
  async renderReadingHabits(el){
    const students=await FireStore.getAllStudents();
    const books=await FireStore.getBooks();

    // Aggregate reading data per student
    const studentReadingData=students.map(s=>{
      const readingBooks=books.filter(b=>(DB.bookProgress[s.id+'_'+b.id]||{}).pagesRead>0);
      const totalPagesRead=books.reduce((sum,b)=>sum+(DB.bookProgress[s.id+'_'+b.id]||{}).pagesRead||0,0);
      const booksFinished=books.filter(b=>(DB.bookProgress[s.id+'_'+b.id]||{}).pagesRead>=b.pages).length;
      const totalReadMinutes=books.reduce((sum,b)=>{
        const prog=DB.bookProgress[s.id+'_'+b.id];
        if(!prog||!prog.pagesRead) return sum;
        return sum+Math.round((prog.pagesRead/b.pages)*b.estimatedMinutes);
      },0);
      const favoriteSubjects={};
      readingBooks.forEach(b=>{favoriteSubjects[b.subject]=(favoriteSubjects[b.subject]||0)+1;});
      const topSubject=Object.entries(favoriteSubjects).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
      const favCategory=books.map(b=>({b,p:DB.bookProgress[s.id+'_'+b.id]||{pagesRead:0}})).sort((a,b)=>b.p.pagesRead-a.p.pagesRead)[0];
      return {
        ...s,
        readingBooks,
        totalPagesRead,
        booksFinished,
        totalReadMinutes,
        topSubject,
        favBook:favCategory?.p?.pagesRead>0?favCategory.b:null
      };
    });

    // Book popularity ranking
    const bookStats=books.map(b=>{
      const readers=students.filter(s=>(DB.bookProgress[s.id+'_'+b.id]||{}).pagesRead>0).length;
      const finishers=students.filter(s=>(DB.bookProgress[s.id+'_'+b.id]||{}).pagesRead>=b.pages).length;
      const totalPages=students.reduce((sum,s)=>sum+(DB.bookProgress[s.id+'_'+b.id]||{}).pagesRead||0,0);
      return {...b, readers, finishers, totalPages};
    }).sort((a,b)=>b.readers-a.readers);

    // Subject interest distribution
    const subjectInterest={};
    students.forEach(s=>{
      books.forEach(b=>{
        const prog=DB.bookProgress[s.id+'_'+b.id];
        if(prog&&prog.pagesRead>0){
          subjectInterest[b.subject]=(subjectInterest[b.subject]||0)+prog.pagesRead;
        }
      });
    });

    el.innerHTML=`<div class="fade-up">
      <div class="flex items-center gap-3 mb-6">
        <div><h2 class="text-xl font-bold text-white">Kebiasaan Bahan Bacaan</h2><p class="text-sm text-[#60607a] mt-1">Analisis kebiasaan membaca mahasiswa dari koleksi iPusnas</p></div>
        <span class="ipusnas-badge ml-2">iPusnas</span>
      </div>
      ${students.length===0?`<div class="card p-10 text-center"><i class="fa-solid fa-book-open-reader text-4xl text-[#30304a] mb-3 block"></i><p class="text-white font-bold mb-1">Belum Ada Data</p><p class="text-[#60607a] text-sm">Data akan muncul setelah mahasiswa membaca buku dari iPusnas.</p></div>`:`
      <!-- Ringkasan kelas -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        ${statCard('fa-book-open-reader','Aktif Membaca',studentReadingData.filter(s=>s.readingBooks.length>0).length+' mhs','#0ea5e9','rgba(14,165,233,.1)')}
        ${statCard('fa-file-lines','Total Halaman',studentReadingData.reduce((s,d)=>s+d.totalPagesRead,0)+' hal','#10b981','rgba(16,185,129,.1)')}
        ${statCard('fa-trophy','Buku Diselesaikan',studentReadingData.reduce((s,d)=>s+d.booksFinished,0)+' judul','#f59e0b','rgba(245,158,11,.1)')}
        ${statCard('fa-clock','Est. Jam Baca',Math.round(studentReadingData.reduce((s,d)=>s+d.totalReadMinutes,0)/60)+' jam','#8b5cf6','rgba(139,92,246,.1)')}
      </div>
      <div class="grid lg:grid-cols-2 gap-4 mb-5">
        <!-- Buku paling banyak dibaca -->
        <div class="card p-5">
          <div class="flex items-center gap-2 mb-4"><h3 class="text-sm font-bold text-white">Buku Paling Populer</h3><span class="ipusnas-badge">iPusnas</span></div>
          <div class="space-y-3">
            ${bookStats.slice(0,5).map((b,i)=>{
              const colors=b.cover.split(',');
              return `<div class="flex items-center gap-3 py-2 border-b border-white/5 last:border-0">
                <span class="text-xs font-bold text-[#50506a] w-5 text-center">${i+1}</span>
                <div style="width:32px;height:40px;background:linear-gradient(135deg,${colors[0]},${colors[1]});border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fa-solid fa-book text-white/80 text-xs"></i></div>
                <div class="flex-1 min-w-0">
                  <p class="text-xs font-semibold text-white truncate">${b.title}</p>
                  <p class="text-[10px] text-[#70709a]">${b.author}</p>
                </div>
                <div class="text-right flex-shrink-0">
                  <p class="text-xs font-bold text-gold-400">${b.readers} pembaca</p>
                  <p class="text-[10px] text-[#60607a]">${b.finishers} selesai</p>
                </div>
              </div>`;
            }).join('')||'<p class="text-xs text-[#50506a] text-center py-6">Belum ada data bacaan</p>'}
          </div>
        </div>
        <!-- Minat subjek -->
        <div class="card p-5">
          <h3 class="text-sm font-bold text-white mb-4">Minat Subjek Mahasiswa</h3>
          ${Object.keys(subjectInterest).length>0?`<canvas id="lect_subject_pie" height="220"></canvas>`:`<div class="flex items-center justify-center h-40"><p class="text-xs text-[#50506a]">Belum ada data</p></div>`}
        </div>
      </div>
      <!-- Per-mahasiswa reading table -->
      <div class="card p-5 mb-5">
        <h3 class="text-sm font-bold text-white mb-4">Detail Kebiasaan Baca per Mahasiswa</h3>
        <div class="overflow-x-auto">
          <table class="data-table">
            <thead><tr><th>Mahasiswa</th><th>Buku Dibaca</th><th>Total Halaman</th><th>Selesai</th><th>Subj. Favorit</th><th>Est. Jam</th><th>Status</th></tr></thead>
            <tbody>${studentReadingData.map(s=>`<tr onclick="LecturerView.showStudentReadingDetail('${s.id}')">
              <td><div class="flex items-center gap-2"><div class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0" style="background:rgba(255,255,255,.06);">${getInitials(s.name)}</div><span class="text-sm font-semibold text-white">${s.name}</span></div></td>
              <td><span class="text-gold-400 font-bold">${s.readingBooks.length}</span></td>
              <td>${s.totalPagesRead}</td>
              <td><span class="text-emerald-400 font-bold">${s.booksFinished}</span></td>
              <td>${s.topSubject?`<span class="badge badge-sky" style="font-size:10px;">${s.topSubject}</span>`:'<span class="text-[#50506a] text-xs">-</span>'}</td>
              <td>${Math.round(s.totalReadMinutes/60*10)/10}j</td>
              <td>${s.readingBooks.length>0?'<span class="badge badge-green">Aktif Baca</span>':'<span class="badge badge-violet">Belum Mulai</span>'}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>
      <!-- Heatmap style: buku x mahasiswa -->
      <div class="card p-5">
        <div class="flex items-center gap-2 mb-4"><h3 class="text-sm font-bold text-white">Matriks Keterbacaan Buku</h3><span class="text-xs text-[#60607a]">— warna = persentase halaman dibaca</span></div>
        <div class="overflow-x-auto">
          <table class="data-table" style="font-size:11px;">
            <thead>
              <tr>
                <th style="min-width:120px;">Mahasiswa</th>
                ${books.map(b=>`<th style="min-width:80px;writing-mode:vertical-lr;transform:rotate(180deg);padding:8px 4px;max-width:80px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${b.title}">${b.title.slice(0,20)}${b.title.length>20?'…':''}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${students.map(s=>`<tr>
                <td class="font-semibold text-white" style="min-width:120px;">${s.name.split(' ')[0]}</td>
                ${books.map(b=>{
                  const prog=DB.bookProgress[s.id+'_'+b.id]||{pagesRead:0};
                  const pct=Math.round((prog.pagesRead/b.pages)*100);
                  const bg=pct>=100?'rgba(16,185,129,.4)':pct>=50?'rgba(245,158,11,.3)':pct>0?'rgba(14,165,233,.2)':'rgba(255,255,255,.03)';
                  const color=pct>=100?'#10b981':pct>=50?'#f59e0b':pct>0?'#0ea5e9':'#40405a';
                  return `<td style="text-align:center;padding:8px 4px;">
                    <div style="background:${bg};border-radius:6px;padding:4px 0;cursor:default;" title="${b.title}: ${pct}% (${prog.pagesRead}/${b.pages} hal)">
                      <span style="color:${color};font-weight:700;font-size:11px;">${pct>0?pct+'%':'·'}</span>
                    </div>
                  </td>`;
                }).join('')}
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`}
    </div>`;

    // Render subject pie chart
    const subjectEntries=Object.entries(subjectInterest);
    if(subjectEntries.length){
      const pieColors=['#f59e0b','#10b981','#f43f5e','#6366f1','#8b5cf6','#0ea5e9','#f97316','#84cc16','#ec4899','#06b6d4','#a855f7','#14b8a6'];
      chartInstances['lect_subject_pie']=new Chart(document.getElementById('lect_subject_pie'),{type:'doughnut',data:{labels:subjectEntries.map(e=>e[0]),datasets:[{data:subjectEntries.map(e=>e[1]),backgroundColor:pieColors.slice(0,subjectEntries.length),borderWidth:0,hoverOffset:6}]},options:{responsive:true,cutout:'55%',plugins:{legend:{position:'bottom',labels:{color:'#9090b0',padding:10,font:{size:10,family:'Outfit'}}}}}});
    }
  },
