<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPattern AI — Analisis Pola Belajar Mahasiswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["DM Sans", "sans-serif"],
            },
            colors: {
              brand: {
                400: "#fbbf24",
                500: "#f59e0b",
                600: "#d97706",
                700: "#b45309",
              },
              surface: {
                900: "#08080f",
                800: "#0f0f18",
                700: "#161622",
                600: "#1e1e2e",
                500: "#2a2a3c",
              },
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --brand: #f59e0b;
        --brand-glow: rgba(245, 158, 11, 0.15);
        --success: #10b981;
        --danger: #ef4444;
        --info: #6366f1;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: #2a2a3c transparent;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: #08080f;
        color: #e5e5e5;
        overflow-x: hidden;
      }
      h1,
      h2,
      h3,
      h4,
      h5 {
        font-family: "Space Grotesk", sans-serif;
      }

      /* Background animasi */
      .bg-glow {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .bg-glow::before,
      .bg-glow::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.4;
        animation: float 12s ease-in-out infinite alternate;
      }
      .bg-glow::before {
        width: 500px;
        height: 500px;
        background: rgba(245, 158, 11, 0.08);
        top: -10%;
        left: -5%;
      }
      .bg-glow::after {
        width: 400px;
        height: 400px;
        background: rgba(99, 102, 241, 0.06);
        bottom: -10%;
        right: -5%;
        animation-delay: -6s;
      }
      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(60px, 40px) scale(1.15);
        }
      }

      /* Glass card */
      .glass {
        background: rgba(22, 22, 34, 0.7);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .glass:hover {
        border-color: rgba(245, 158, 11, 0.2);
      }
      .glass-static {
        background: rgba(22, 22, 34, 0.7);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      /* Sidebar */
      .sidebar-link {
        transition: all 0.2s;
        border-left: 3px solid transparent;
      }
      .sidebar-link:hover,
      .sidebar-link.active {
        background: rgba(245, 158, 11, 0.08);
        border-left-color: var(--brand);
        color: var(--brand);
      }

      /* Toast */
      .toast {
        animation:
          slideIn 0.3s ease-out,
          fadeOut 0.4s 2.6s ease-in forwards;
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes fadeOut {
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }

      /* Fade in untuk konten */
      .fade-in {
        animation: fadeUp 0.4s ease-out;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Stat card pulse */
      .stat-icon {
        animation: pulse-soft 3s ease-in-out infinite;
      }
      @keyframes pulse-soft {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.08);
        }
      }

      /* Input styling */
      input,
      select,
      textarea {
        background: rgba(15, 15, 24, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #e5e5e5;
        transition: border-color 0.2s;
      }
      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--brand);
        box-shadow: 0 0 0 3px var(--brand-glow);
      }

      /* Range slider */
      input[type="range"] {
        -webkit-appearance: none;
        background: transparent;
        border: none;
      }
      input[type="range"]::-webkit-slider-track {
        height: 6px;
        background: #2a2a3c;
        border-radius: 3px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--brand);
        cursor: pointer;
        margin-top: -6px;
      }

      /* Tabel */
      .tbl-row {
        transition: background 0.15s;
      }
      .tbl-row:hover {
        background: rgba(245, 158, 11, 0.04);
      }

      /* Badge */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      /* Mobile sidebar */
      @media (max-width: 768px) {
        .sidebar-desktop {
          transform: translateX(-100%);
          position: fixed;
          z-index: 50;
        }
        .sidebar-desktop.open {
          transform: translateX(0);
        }
        .main-content {
          margin-left: 0 !important;
        }
      }

      /* Tab indicator */
      .tab-btn {
        position: relative;
        transition: color 0.2s;
      }
      .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--brand);
        border-radius: 1px;
      }
    </style>
  </head>

              </div>

        <!-- Demo Accounts -->

    <script>
      /* ================================================================
   FIREBASE SIMULATION LAYER
   Struktur ini meniru Firebase SDK. Tinggal ganti dengan import
   dari CDN Firebase untuk production.
   ================================================================ */
      const DB = {users: {}, aktivitas: [], analisis: {}};

      const FireAuth = {
        async signIn(email, password) {
          await delay(400);
          const user = Object.values(DB.users).find((u) => u.email === email);
          if (!user) throw new Error("Akun tidak ditemukan");
          if (user.password !== password) throw new Error("Password salah");
          return {
            uid: user.id,
            email: user.email,
            displayName: user.name,
            role: user.role,
          };
        },
        async signUp(name, email, password, role) {
          await delay(500);
          if (Object.values(DB.users).find((u) => u.email === email))
            throw new Error("Email sudah terdaftar");
          const id = "u_" + Date.now();
          DB.users[id] = {id, name, email, password, role};
          return {uid: id, email, displayName: name, role};
        },
        signOut() {},
      };

      const FireStore = {
        async getActivities(userId) {
          await delay(100);
          return DB.aktivitas
            .filter((a) => a.userId === userId)
            .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        },
        async addActivity(data) {
          await delay(200);
          const id = "act_" + Date.now();
          const doc = {id, ...data};
          DB.aktivitas.push(doc);
          // Trigger Cloud Function
          CloudFunctions.onActivityCreated(doc);
          return doc;
        },
        async getAnalysis(userId) {
          await delay(100);
          return DB.analisis[userId] || null;
        },
        async getAllStudents() {
          await delay(100);
          return Object.values(DB.users).filter((u) => u.role === "student");
        },
      };

      /* ================================================================
   CLOUD FUNCTIONS SIMULATION
   Trigger otomatis saat ada data baru — mirip Firestore trigger
   ================================================================ */
      const CloudFunctions = {
        onActivityCreated(activity) {
          const userId = activity.userId;
          const allActs = DB.aktivitas.filter((a) => a.userId === userId);
          const analysis = AIEngine.analyzePatterns(allActs);
          const recommendations = AIEngine.generateRecommendations(analysis);
          DB.analisis[userId] = {
            polaBelajar: analysis,
            rekomendasi: recommendations,
            updatedAt: new Date().toISOString(),
          };
        },
      };

      /* ================================================================
   AI ENGINE — Rule-Based Analysis
   ================================================================ */
      const AIEngine = {
        analyzePatterns(activities) {
          if (!activities.length) return this.emptyAnalysis();

          const now = new Date();
          const weekMs = 7 * 86400000;

          // Distribusi waktu belajar
          const timeSlots = {pagi: 0, siang: 0, sore: 0, malam: 0, larut: 0};
          let totalDurasi = 0,
            durations = [];
          const materiCount = {};
          const dailyHours = {}; // key: YYYY-MM-DD, value: total minutes

          activities.forEach((a) => {
            const d = new Date(a.timestamp);
            const h = d.getHours();
            totalDurasi += a.durasi;
            durations.push(a.durasi);
            materiCount[a.materi] = (materiCount[a.materi] || 0) + 1;

            const dayKey = d.toISOString().slice(0, 10);
            dailyHours[dayKey] = (dailyHours[dayKey] || 0) + a.durasi;

            if (h >= 6 && h < 12) timeSlots.pagi++;
            else if (h >= 12 && h < 15) timeSlots.siang++;
            else if (h >= 15 && h < 18) timeSlots.sore++;
            else if (h >= 18 && h < 22) timeSlots.malam++;
            else timeSlots.larut++;
          });

          // Tipe belajar dominan
          const maxSlot = Object.entries(timeSlots).sort(
            (a, b) => b[1] - a[1],
          )[0];
          const typeMap = {
            pagi: "Pagi Hari (06-12)",
            siang: "Siang Hari (12-15)",
            sore: "Sore Hari (15-18)",
            malam: "Malam Hari (18-22)",
            larut: "Larut Malam (22-06)",
          };
          const tipeBelajar = typeMap[maxSlot[0]];

          // Statistik durasi
          const avgDurasi = totalDurasi / activities.length;
          const minDurasi = Math.min(...durations);
          const maxDurasi = Math.max(...durations);
          const stdDurasi = Math.sqrt(
            durations.reduce((s, d) => s + Math.pow(d - avgDurasi, 2), 0) /
              durations.length,
          );
          const kategoriDurasi =
            avgDurasi < 30
              ? "Kurang Fokus"
              : avgDurasi < 60
                ? "Sedang"
                : avgDurasi < 120
                  ? "Fokus"
                  : "Intensif";

          // Konsistensi
          const dayValues = Object.values(dailyHours);
          const avgPerDay =
            dayValues.reduce((s, v) => s + v, 0) / dayValues.length;
          const stdDay = Math.sqrt(
            dayValues.reduce((s, v) => s + Math.pow(v - avgPerDay, 2), 0) /
              dayValues.length,
          );
          const consistencyScore = Math.max(
            0,
            Math.min(
              100,
              Math.round(100 - (stdDay / Math.max(1, avgPerDay)) * 100),
            ),
          );
          const konsistensi =
            consistencyScore >= 70
              ? "Konsisten"
              : consistencyScore >= 40
                ? "Cukup Konsisten"
                : "Tidak Konsisten";

          // Frekuensi
          const totalSessions = activities.length;
          const activeDays = Object.keys(dailyHours).length;
          const daysSpan = Math.max(
            1,
            Math.ceil(
              (now - new Date(activities[activities.length - 1].timestamp)) /
                86400000,
            ),
          );
          const freqPerWeek = (totalSessions / daysSpan) * 7;

          // Materi favorit
          const topMateri = Object.entries(materiCount)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3);

          // Trend (bandingkan minggu lalu vs minggu ini)
          const week1 = activities.filter(
            (a) => now - new Date(a.timestamp) < weekMs,
          );
          const week2 = activities.filter((a) => {
            const diff = now - new Date(a.timestamp);
            return diff >= weekMs && diff < 2 * weekMs;
          });
          const avgW1 = week1.length
            ? week1.reduce((s, a) => s + a.durasi, 0) / week1.length
            : 0;
          const avgW2 = week2.length
            ? week2.reduce((s, a) => s + a.durasi, 0) / week2.length
            : 0;
          const trendPct =
            avgW2 > 0
              ? Math.round(((avgW1 - avgW2) / avgW2) * 100)
              : week1.length > 0
                ? 50
                : 0;
          const tren =
            trendPct > 10 ? "Meningkat" : trendPct < -10 ? "Menurun" : "Stabil";

          // Skor keseluruhan (0-100)
          const skor = Math.round(
            consistencyScore * 0.35 +
              Math.min(100, (avgDurasi / 90) * 100) * 0.3 +
              Math.min(100, (freqPerWeek / 7) * 100) * 0.2 +
              (trendPct > 0 ? 20 : trendPct > -10 ? 10 : 0),
          );

          // Distribusi per hari dalam seminggu
          const dayNames = [
            "Minggu",
            "Senin",
            "Selasa",
            "Rabu",
            "Kamis",
            "Jumat",
            "Sabtu",
          ];
          const dayOfWeekDist = [0, 0, 0, 0, 0, 0, 0];
          const dayOfWeekMinutes = [0, 0, 0, 0, 0, 0, 0];
          activities.forEach((a) => {
            const dow = new Date(a.timestamp).getDay();
            dayOfWeekDist[dow]++;
            dayOfWeekMinutes[dow] += a.durasi;
          });

          return {
            totalSessions,
            totalDurasi,
            totalJam: (totalDurasi / 60).toFixed(1),
            avgDurasi: Math.round(avgDurasi),
            minDurasi,
            maxDurasi,
            stdDurasi: Math.round(stdDurasi),
            kategoriDurasi,
            tipeBelajar,
            konsistensi,
            consistencyScore,
            activeDays,
            daysSpan,
            freqPerWeek: Math.round(freqPerWeek * 10) / 10,
            topMateri,
            tren,
            trendPct,
            skor,
            timeSlots,
            dayOfWeekDist,
            dayOfWeekMinutes,
          };
        },

        emptyAnalysis() {
          return {
            totalSessions: 0,
            totalDurasi: 0,
            totalJam: "0",
            avgDurasi: 0,
            skor: 0,
            tren: "Belum ada data",
            konsistensi: "-",
            tipeBelajar: "-",
            kategoriDurasi: "-",
            topMateri: [],
            timeSlots: {pagi: 0, siang: 0, sore: 0, malam: 0, larut: 0},
            dayOfWeekDist: [0, 0, 0, 0, 0, 0, 0],
            dayOfWeekMinutes: [0, 0, 0, 0, 0, 0, 0],
          };
        },

        generateRecommendations(analysis) {
          if (analysis.totalSessions === 0)
            return [
              {
                icon: "fa-circle-info",
                color: "text-blue-400",
                bg: "bg-blue-500/10",
                title: "Mulai Catat Aktivitas",
                desc: "Belum ada data belajar. Mulai input aktivitas belajar untuk mendapatkan analisis dan rekomendasi personal.",
              },
            ];

          const recs = [];

          // Durasi
          if (analysis.avgDurasi < 30) {
            recs.push({
              icon: "fa-clock",
              color: "text-amber-400",
              bg: "bg-amber-500/10",
              title: "Tingkatkan Durasi Belajar",
              desc: `Rata-rata belajar Anda hanya ${analysis.avgDurasi} menit per sesi. Disarankan minimal 45-60 menit per sesi agar materi terserap optimal. Gunakan teknik Pomodoro (25 menit fokus + 5 menit istirahat).`,
            });
          } else if (analysis.avgDurasi > 120) {
            recs.push({
              icon: "fa-hourglass-half",
              color: "text-orange-400",
              bg: "bg-orange-500/10",
              title: "Hindari Belajar Terlalu Lama",
              desc: `Rata-rata ${analysis.avgDurasi} menit per sesi bisa menyebabkan kelelahan kognitif. Bagi sesi menjadi 2-3 blok dengan istirahat 15-30 menit di antaranya.`,
            });
          } else {
            recs.push({
              icon: "fa-check-circle",
              color: "text-emerald-400",
              bg: "bg-emerald-500/10",
              title: "Durasi Belajar Baik",
              desc: `Rata-rata ${analysis.avgDurasi} menit per sesi sudah dalam rentang optimal. Pertahankan konsistensi ini.`,
            });
          }

          // Konsistensi
          if (analysis.consistencyScore < 40) {
            recs.push({
              icon: "fa-calendar-xmark",
              color: "text-red-400",
              bg: "bg-red-500/10",
              title: "Tingkatkan Konsistensi",
              desc: `Pola belajar Anda sangat tidak konsisten. Buat jadwal belajar tetap setiap hari, misalnya jam yang sama. Konsistensi lebih penting daripada durasi panjang.`,
            });
          }

          // Waktu
          if (analysis.tipeBelajar.includes("Larut")) {
            recs.push({
              icon: "fa-moon",
              color: "text-indigo-400",
              bg: "bg-indigo-500/10",
              title: "Pertimbangkan Shift Waktu",
              desc: "Belajar larut malam (>22:00) bisa mengganggu kualitas tidur dan konsentrasi keesokan harinya. Coba mulai belajar lebih awal jika memungkinkan.",
            });
          }

          // Frekuensi
          if (analysis.freqPerWeek < 4) {
            recs.push({
              icon: "fa-repeat",
              color: "text-cyan-400",
              bg: "bg-cyan-500/10",
              title: "Tingkatkan Frekuensi",
              desc: `Anda hanya belajar sekitar ${analysis.freqPerWeek} kali per minggu. Idealnya 5-7 sesi per minggu dengan durasi sedang, daripada 1-2 sesi sangat panjang.`,
            });
          }

          // Trend
          if (analysis.tren === "Menurun") {
            recs.push({
              icon: "fa-arrow-trend-down",
              color: "text-red-400",
              bg: "bg-red-500/10",
              title: "Tren Menurun Terdeteksi",
              desc: `Aktivitas belajar Anda menurun ${Math.abs(analysis.trendPct)}% dibanding minggu sebelumnya. Identifikasi hambatan dan cari motivasi. Diskusi dengan teman atau dosen bisa membantu.`,
            });
          } else if (analysis.tren === "Meningkat") {
            recs.push({
              icon: "fa-arrow-trend-up",
              color: "text-emerald-400",
              bg: "bg-emerald-500/10",
              title: "Tren Positif",
              desc: `Aktivitas belajar Anda meningkat ${analysis.trendPct}%. Pertahankan momentum ini dan tetap disiplin dengan jadwal.`,
            });
          }

          // Materi
          if (analysis.topMateri.length >= 1) {
            const least = analysis.topMateri[analysis.topMateri.length - 1];
            recs.push({
              icon: "fa-book-open",
              color: "text-violet-400",
              bg: "bg-violet-500/10",
              title: "Perhatikan Keseimbangan Materi",
              desc: `Materi yang paling sering dipelajari: ${analysis.topMateri[0][0]}. Pastikan semua materi mendapat porsi yang seimbang, termasuk ${least[0]} yang jarang disentuh.`,
            });
          }

          return recs;
        },

        isAtRisk(analysis) {
          if (!analysis || analysis.totalSessions === 0) return true;
          let riskScore = 0;
          if (analysis.freqPerWeek < 3) riskScore += 3;
          else if (analysis.freqPerWeek < 5) riskScore += 1;
          if (analysis.avgDurasi < 25) riskScore += 3;
          else if (analysis.avgDurasi < 40) riskScore += 1;
          if (analysis.consistencyScore < 30) riskScore += 3;
          else if (analysis.consistencyScore < 50) riskScore += 1;
          if (analysis.tren === "Menurun") riskScore += 2;
          if (analysis.skor < 30) riskScore += 2;
          else if (analysis.skor < 50) riskScore += 1;
          return riskScore >= 5;
        },
      };

        return (
          d.toLocaleDateString("id-ID", {
            day: "numeric",
            month: "short",
            year: "numeric",
          }) +
          " " +
          d.toLocaleTimeString("id-ID", {hour: "2-digit", minute: "2-digit"})

                                <tr class="tbl-row border-b border-white/5 last:border-0 cursor-pointer" onclick="LecturerView.showStudentDetail('${r.id}')">
                                    <td class="px-5 py-3">
                                        <div class="flex items-center gap-3">
                                            <div class="w-7 h-7 rounded-full bg-surface-500 flex items-center justify-center text-[10px] font-bold text-gray-300">${getInitials(r.name)}</div>
                                            <span class="text-gray-200 font-medium">${r.name}</span>
                                        </div>
                                    </td>
                                    <td class="px-5 py-3 text-gray-400">${r.analysis.totalSessions}</td>
                                    <td class="px-5 py-3 text-gray-400">${r.analysis.totalJam}</td>
                                    <td class="px-5 py-3 text-gray-400">${r.analysis.avgDurasi}m</td>
                                    <td class="px-5 py-3">
                                        <div class="flex items-center gap-2">
                                            <div class="w-16 h-1.5 rounded-full bg-surface-600"><div class="h-full rounded-full ${r.analysis.consistencyScore >= 70 ? "bg-emerald-500" : r.analysis.consistencyScore >= 40 ? "bg-amber-500" : "bg-red-500"}" style="width:${r.analysis.consistencyScore}%"></div></div>
                                            <span class="text-[11px] text-gray-500">${r.analysis.consistencyScore}</span>
                                        </div>
                                    </td>
                                    <td class="px-5 py-3 text-gray-400 text-xs">${r.analysis.tipeBelajar.split("(")[0].trim()}</td>
                                    <td class="px-5 py-3 font-bold ${r.analysis.skor >= 70 ? "text-emerald-400" : r.analysis.skor >= 40 ? "text-amber-400" : "text-red-400"}">${r.analysis.skor}</td>
                                    <td class="px-5 py-3">
                                        ${
                                          r.isRisk
                                            ? '<span class="badge bg-red-500/15 text-red-400"><i class="fa-solid fa-circle text-[6px]"></i>Bermasalah</span>'
                                            : '<span class="badge bg-emerald-500/15 text-emerald-400"><i class="fa-solid fa-circle text-[6px]"></i>Aktif</span>'
                                        }
                                    </td>
                                </tr>
                            `,
                              )
                              .join("")}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>`;
        },

        async showStudentDetail(studentId) {
          const student = DB.users[studentId];
          const a =
            DB.analisis[studentId]?.polaBelajar || AIEngine.emptyAnalysis();
          const recs = DB.analisis[studentId]?.rekomendasi || [];
          const acts = DB.aktivitas
            .filter((act) => act.userId === studentId)
            .slice(0, 10);

          const container = document.getElementById("lecturerContent");
          destroyCharts("lect_");

          container.innerHTML = `
        <div class="fade-in">
            <button onclick="LecturerView.showTab('monitoring')" class="flex items-center gap-2 text-sm text-gray-400 hover:text-brand-500 mb-4 transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Monitoring
            </button>

            <div class="glass rounded-xl p-6 mb-4">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-12 h-12 rounded-xl bg-brand-500/10 flex items-center justify-center text-brand-500 font-bold">${getInitials(student.name)}</div>
                    <div>
                        <h2 class="text-lg font-bold text-white">${student.name}</h2>
                        <p class="text-xs text-gray-500">${student.email}</p>
                    </div>
                    <div class="ml-auto">
                        ${
                          AIEngine.isAtRisk(a)
                            ? '<span class="badge bg-red-500/15 text-red-400 text-sm px-4 py-1"><i class="fa-solid fa-triangle-exclamation mr-1"></i>Bermasalah</span>'
                            : '<span class="badge bg-emerald-500/15 text-emerald-400 text-sm px-4 py-1"><i class="fa-solid fa-check mr-1"></i>Aktif</span>'
                        }
                    </div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    ${StudentView.statCard("fa-gauge-high", "Skor", a.skor + "/100", a.skor >= 70 ? "text-emerald-400" : a.skor >= 40 ? "text-amber-400" : "text-red-400", a.skor >= 70 ? "bg-emerald-500/10" : a.skor >= 40 ? "bg-amber-500/10" : "bg-red-500/10")}
                    ${StudentView.statCard("fa-clock", "Total Jam", a.totalJam + " jam", "text-brand-400", "bg-brand-500/10")}
                    ${StudentView.statCard("fa-repeat", "Konsistensi", a.consistencyScore + "/100", a.consistencyScore >= 70 ? "text-emerald-400" : "text-amber-400", a.consistencyScore >= 70 ? "bg-emerald-500/10" : "bg-amber-500/10")}
                    ${StudentView.statCard("fa-arrow-trend-up", "Tren", a.tren, a.tren === "Meningkat" ? "text-emerald-400" : a.tren === "Menurun" ? "text-red-400" : "text-gray-400", a.tren === "Meningkat" ? "bg-emerald-500/10" : a.tren === "Menurun" ? "bg-red-500/10" : "bg-surface-600")}
                </div>
            </div>

            <div class="grid lg:grid-cols-2 gap-4 mb-4">
                <div class="glass rounded-xl p-5">
                    <h3 class="text-sm font-semibold text-white mb-4">Distribusi Waktu</h3>
                    <canvas id="lect_detail_time" height="200"></canvas>
                </div>
                <div class="glass rounded-xl p-5">
                    <h3 class="text-sm font-semibold text-white mb-4">Belajar per Hari</h3>
                    <canvas id="lect_detail_day" height="200"></canvas>
                </div>
            </div>

            ${
              recs.length
                ? `
            <div class="glass rounded-xl p-5 mb-4">
                <h3 class="text-sm font-semibold text-white mb-3">Rekomendasi untuk ${student.name.split(" ")[0]}</h3>
                <div class="space-y-2">
                    ${recs
                      .slice(0, 3)
                      .map(
                        (r) => `
                        <div class="flex items-start gap-3 p-3 rounded-lg bg-surface-800/50">
                            <i class="fa-solid ${r.icon} ${r.color} mt-0.5"></i>
                            <div><p class="text-xs font-medium text-gray-200">${r.title}</p><p class="text-xs text-gray-500 mt-0.5">${r.desc.slice(0, 120)}...</p></div>
                        </div>
                    `,
                      )
                      .join("")}
                </div>
            </div>`
                : ""
            }

            <div class="glass rounded-xl p-5">
                <h3 class="text-sm font-semibold text-white mb-3">Aktivitas Terakhir</h3>
                <div class="space-y-2 max-h-[200px] overflow-y-auto">
                    ${acts
                      .map(
                        (ac) => `
                        <div class="flex items-center gap-3 py-2 border-b border-white/5 last:border-0">
                            <div class="w-7 h-7 rounded-lg bg-surface-600 flex items-center justify-center"><i class="fa-solid fa-book text-gray-500 text-[10px]"></i></div>
                            <div class="flex-1"><p class="text-xs text-gray-300">${ac.materi}</p><p class="text-[10px] text-gray-600">${formatTime(ac.timestamp)}</p></div>
                            <span class="text-xs text-brand-400 font-medium">${ac.durasi}m</span>
                        </div>
                    `,
                      )
                      .join("")}
                </div>
            </div>
        </div>`;

          // Charts
          const slotLabels = ["Pagi", "Siang", "Sore", "Malam", "Larut"];
          const slotData = [
            a.timeSlots.pagi,
            a.timeSlots.siang,
            a.timeSlots.sore,
            a.timeSlots.malam,
            a.timeSlots.larut,
          ];
          chartInstances["lect_detail_time"] = new Chart(
            document.getElementById("lect_detail_time"),
            {
              type: "doughnut",
              data: {
                labels: slotLabels,
                datasets: [
                  {
                    data: slotData,
                    backgroundColor: [
                      "#fbbf24",
                      "#10b981",
                      "#f97316",
                      "#6366f1",
                      "#8b5cf6",
                    ],
                    borderWidth: 0,
                  },
                ],
              },
              options: {
                responsive: true,
                cutout: "55%",
                plugins: {
                  legend: {
                    position: "bottom",
                    labels: {color: "#9ca3af", font: {size: 11}},
                  },
                },
              },
            },
          );
          chartInstances["lect_detail_day"] = new Chart(
            document.getElementById("lect_detail_day"),
            {
              type: "bar",
              data: {
                labels: ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"],
                datasets: [
                  {
                    data: a.dayOfWeekMinutes,
                    backgroundColor: "rgba(99,102,241,0.5)",
                    borderColor: "#6366f1",
                    borderWidth: 1,
                    borderRadius: 6,
                  },
                ],
              },
              options: {
                responsive: true,
                plugins: {legend: {display: false}},
                scales: {
                  y: {
                    beginAtZero: true,
                    grid: {color: "rgba(255,255,255,0.03)"},
                    ticks: {color: "#6b7280"},
                  },
                  x: {grid: {display: false}, ticks: {color: "#6b7280"}},
                },
              },
            },
          );
        },

        async renderPerformance(el) {
          const students = await FireStore.getAllStudents();
          const stats = students.map((s) => ({
            ...s,
            a: DB.analisis[s.id]?.polaBelajar || AIEngine.emptyAnalysis(),
          }));

          el.innerHTML = `
        <div class="fade-in">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-white">Performa Kelas</h2>
                <p class="text-sm text-gray-400 mt-1">Perbandingan multidimensi antar mahasiswa</p>
            </div>
            <div class="glass rounded-xl p-5 mb-4">
                <h3 class="text-sm font-semibold text-white mb-4">Radar Perbandingan</h3>
                <canvas id="lect_radar" height="300"></canvas>
            </div>
            <div class="glass rounded-xl p-5">
                <h3 class="text-sm font-semibold text-white mb-4">Total Durasi Belajar (Jam)</h3>
                <canvas id="lect_hours_chart" height="200"></canvas>
            </div>
        </div>`;

          // Radar chart
          const radarColors = [
            "#f59e0b",
            "#10b981",
            "#6366f1",
            "#ec4899",
            "#ef4444",
            "#8b5cf6",
          ];
          chartInstances["lect_radar"] = new Chart(
            document.getElementById("lect_radar"),
            {
              type: "radar",
              data: {
                labels: [
                  "Skor",
                  "Konsistensi",
                  "Frekuensi",
                  "Durasi",
                  "Variasi Materi",
                ],
                datasets: stats.map((s, i) => ({
                  label: s.name.split(" ")[0],
                  data: [
                    s.a.skor,
                    s.a.consistencyScore,
                    Math.min(100, Math.round((s.a.freqPerWeek / 7) * 100)),
                    Math.min(100, Math.round((s.a.avgDurasi / 90) * 100)),
                    Math.min(100, s.a.topMateri.length * 25),
                  ],
                  borderColor: radarColors[i % radarColors.length],
                  backgroundColor: radarColors[i % radarColors.length] + "15",
                  borderWidth: 2,
                  pointRadius: 3,
                  pointBackgroundColor: radarColors[i % radarColors.length],
                })),
              },
              options: {
                responsive: true,
                scales: {
                  r: {
                    beginAtZero: true,
                    max: 100,
                    grid: {color: "rgba(255,255,255,0.05)"},
                    angleLines: {color: "rgba(255,255,255,0.05)"},
                    pointLabels: {color: "#9ca3af", font: {size: 11}},
                    ticks: {display: false},
                  },
                },
                plugins: {
                  legend: {
                    position: "bottom",
                    labels: {color: "#9ca3af", padding: 12, font: {size: 11}},
                  },
                },
              },
            },
          );

          // Hours bar
          chartInstances["lect_hours_chart"] = new Chart(
            document.getElementById("lect_hours_chart"),
            {
              type: "bar",
              data: {
                labels: stats.map((s) => s.name.split(" ")[0]),
                datasets: [
                  {
                    label: "Jam",
                    data: stats.map((s) => parseFloat(s.a.totalJam)),
                    backgroundColor: stats.map(
                      (s, i) => radarColors[i % radarColors.length] + "80",
                    ),
                    borderColor: stats.map(
                      (s, i) => radarColors[i % radarColors.length],
                    ),
                    borderWidth: 1,
                    borderRadius: 8,
                  },
                ],
              },
              options: {
                responsive: true,
                plugins: {legend: {display: false}},
                scales: {
                  y: {
                    beginAtZero: true,
                    grid: {color: "rgba(255,255,255,0.03)"},
                    ticks: {color: "#6b7280"},
                  },
                  x: {grid: {display: false}, ticks: {color: "#6b7280"}},
                },
              },
            },
          );
        },

        async renderAtRisk(el) {
          const students = await FireStore.getAllStudents();
          const atRisk = students.filter((s) =>
            AIEngine.isAtRisk(DB.analisis[s.id]?.polaBelajar),
          );
          const safe = students.filter(
            (s) => !AIEngine.isAtRisk(DB.analisis[s.id]?.polaBelajar),
          );

          el.innerHTML = `
        <div class="fade-in">
            <div class="mb-6">
                <h2 class="text-xl font-bold text-white">Mahasiswa Bermasalah</h2>
                <p class="text-sm text-gray-400 mt-1">Identifikasi dini mahasiswa yang membutuhkan perhatian khusus</p>
            </div>

            ${
              atRisk.length === 0
                ? `
                <div class="glass rounded-xl p-12 text-center">
                    <div class="w-16 h-16 rounded-full bg-emerald-500/10 flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-check-circle text-2xl text-emerald-400"></i></div>
                    <h3 class="text-lg font-bold text-white mb-1">Semua Mahasiswa Dalam Kondisi Baik</h3>
                    <p class="text-sm text-gray-400">Tidak ada mahasiswa yang terdeteksi bermasalah saat ini.</p>
                </div>
            `
                : `
                <!-- Alert Banner -->
                <div class="glass rounded-xl p-4 mb-4 border-l-4 border-red-500 flex items-center gap-3">
                    <i class="fa-solid fa-triangle-exclamation text-red-400 text-lg"></i>
                    <div>
                        <p class="text-sm font-semibold text-white">${atRisk.length} mahasiswa teridentifikasi berisiko</p>
                        <p class="text-xs text-gray-400">Perlu tindakan follow-up: konsultasi, pembimbingan, atau penyesuaian metode belajar.</p>
                    </div>
                </div>

                <!-- Risk Cards -->
                <div class="space-y-3 mb-6">
                    ${atRisk
                      .map((s) => {
                        const a =
                          DB.analisis[s.id]?.polaBelajar ||
                          AIEngine.emptyAnalysis();
                        const problems = [];
                        if (a.freqPerWeek < 3)
                          problems.push("Frekuensi belajar sangat rendah");
                        if (a.avgDurasi < 25)
                          problems.push("Durasi belajar terlalu singkat");
                        if (a.consistencyScore < 30)
                          problems.push("Pola belajar tidak konsisten");
                        if (a.tren === "Menurun")
                          problems.push("Tren belajar menurun");
                        if (a.skor < 30)
                          problems.push("Skor keseluruhan rendah");

                        return `
                        <div class="glass rounded-xl p-5 cursor-pointer hover:border-red-500/30 transition-colors" onclick="LecturerView.showStudentDetail('${s.id}')">
                            <div class="flex items-center gap-4 mb-3">
                                <div class="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center text-red-400 font-bold text-sm">${getInitials(s.name)}</div>
                                <div class="flex-1">
                                    <p class="text-sm font-semibold text-white">${s.name}</p>
                                    <p class="text-xs text-gray-500">${s.email}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-lg font-bold text-red-400">${a.skor}</p>
                                    <p class="text-[10px] text-gray-500">skor</p>
                                </div>
                            </div>
                            <div class="space-y-1.5">
                                ${problems
                                  .map(
                                    (p) => `
                                    <div class="flex items-center gap-2 text-xs text-gray-400">
                                        <i class="fa-solid fa-circle-xmark text-red-400/70 text-[10px]"></i>${p}
                                    </div>
                                `,
                                  )
                                  .join("")}
                            </div>
                            <div class="flex items-center gap-4 mt-3 pt-3 border-t border-white/5 text-[11px] text-gray-500">
                                <span><i class="fa-solid fa-book-open mr-1"></i>${a.totalSessions} sesi</span>
                                <span><i class="fa-solid fa-clock mr-1"></i>${a.totalJam} jam</span>
                                <span><i class="fa-solid fa-repeat mr-1"></i>${a.freqPerWeek}x/minggu</span>
                            </div>
                        </div>`;
                      })
                      .join("")}
                </div>
            `
            }

            <!-- All Students Comparison -->
            <div class="glass rounded-xl p-5">
                <h3 class="text-sm font-semibold text-white mb-4">Perbandingan Skor Semua Mahasiswa</h3>
                <canvas id="lect_risk_bar" height="160"></canvas>
            </div>
        </div>`;

          // Comparison bar chart
          const allStudents = [...atRisk, ...safe];
          chartInstances["lect_risk_bar"] = new Chart(
            document.getElementById("lect_risk_bar"),
            {
              type: "bar",
              data: {
                labels: allStudents.map((s) => s.name.split(" ")[0]),
                datasets: [
                  {
                    label: "Skor",
                    data: allStudents.map(
                      (s) =>
                        (
                          DB.analisis[s.id]?.polaBelajar ||
                          AIEngine.emptyAnalysis()
                        ).skor,
                    ),
                    backgroundColor: allStudents.map((s) =>
                      AIEngine.isAtRisk(DB.analisis[s.id]?.polaBelajar)
                        ? "rgba(239,68,68,0.6)"
                        : "rgba(16,185,129,0.5)",
                    ),
                    borderColor: allStudents.map((s) =>
                      AIEngine.isAtRisk(DB.analisis[s.id]?.polaBelajar)
                        ? "#ef4444"
                        : "#10b981",
                    ),
                    borderWidth: 1,
                    borderRadius: 8,
                  },
                ],
              },
              options: {
                responsive: true,
                indexAxis: "y",
                plugins: {legend: {display: false}},
                scales: {
                  x: {
                    beginAtZero: true,
                    max: 100,
                    grid: {color: "rgba(255,255,255,0.03)"},
                    ticks: {color: "#6b7280"},
                  },
                  y: {
                    grid: {display: false},
                    ticks: {color: "#e5e5e5", font: {size: 12}},
                  },
                },
              },
            },
          );
        },
      };

      /* ================================================================
   AUTH HANDLERS
   ================================================================ */
      function switchAuthTab(tab) {
        const isLogin = tab === "login";
        document.getElementById("tabLogin").className =
          `flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all ${isLogin ? "bg-brand-500 text-black" : "text-gray-400"}`;
        document.getElementById("tabRegister").className =
          `flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all ${!isLogin ? "bg-brand-500 text-black" : "text-gray-400"}`;
        document
          .getElementById("loginForm")
          .classList.toggle("hidden", !isLogin);
        document
          .getElementById("registerForm")
          .classList.toggle("hidden", isLogin);
      }

      function fillDemo(role) {
        if (role === "student") {
          document.getElementById("loginEmail").value = "student@demo.com";
          document.getElementById("loginPass").value = "password123";
        } else {
          document.getElementById("loginEmail").value = "dosen@demo.com";
          document.getElementById("loginPass").value = "password123";
        }
        switchAuthTab("login");
        toast("Akun demo terisi, klik Masuk", "info");
      }

      async function handleLogin(e) {
        e.preventDefault();
        const btn = e.target.querySelector("button[type=submit]");
        btn.disabled = true;
        btn.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Memproses...';
        try {
          await App.login(
            document.getElementById("loginEmail").value,
            document.getElementById("loginPass").value,
          );
        } catch (err) {
          toast(err.message, "error");
        }
        btn.disabled = false;
        btn.innerHTML =
          '<i class="fa-solid fa-right-to-bracket mr-2"></i>Masuk';
      }

      async function handleRegister(e) {
        e.preventDefault();
        const btn = e.target.querySelector("button[type=submit]");
        btn.disabled = true;
        btn.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Mendaftar...';
        try {
          await App.register(
            document.getElementById("regName").value,
            document.getElementById("regEmail").value,
            document.getElementById("regPass").value,
            document.getElementById("regRole").value,
          );
        } catch (err) {
          toast(err.message, "error");
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-user-plus mr-2"></i>Daftar Akun';
      }

      /* ================================================================
   INIT
   ================================================================ */
      document.addEventListener("DOMContentLoaded", () => App.init());
    </script>
  </body>
</html>
